<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match Detail</title>

<style>
body{
    margin:0;
    font-family:system-ui;

}
.topbar{
    padding:18px;

.container{
    max-width:420px;

}

<body>

<div class="topbar">
<span onclick="window.location.href='zapasy.html'" style="cursor:pointer">
← Zpět
</span>
</div>

<div id="app" class="container"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA_bZAUiFIzQYrYTqdVkvF6GliLWbu7WN4",
  authDomain: "matchlab-f7fb8.firebaseapp.com",
  projectId: "matchlab-f7fb8",
  storageBucket: "matchlab-f7fb8.firebasestorage.app",
  messagingSenderId: "791469272358",
  appId: "1:791469272358:web:3a3502f0b65d68bedb65e7"
};

const appFB = initializeApp(firebaseConfig);
const db = getFirestore(appFB);

async function getData(){
    const snap = await getDoc(doc(db,"appData","main"));
    return snap.data();
}

async function saveData(data){
    await setDoc(doc(db,"appData","main"),data);
}

function getMatchId(){
    return new URLSearchParams(window.location.search).get("id");
}

function findMatch(data, matchId){

let match=null;
let league=null;
let sport=null;

data.sports.forEach(s=>{
    s.leagues?.forEach(l=>{
        l.seasons?.forEach(season=>{
            season.rounds?.forEach(round=>{
                round.matches?.forEach(m=>{
                    if(m.id===matchId){
                        match=m;
                        league=l;
                        sport=s;
                    }
                });
            });
        });
    });
});

   return {match,league,sport};
}

function calculateScore(match){

    let homeGoals = 0;
    let awayGoals = 0;

    let homeOwnGoals = 0;
    let awayOwnGoals = 0;

    if(!match.playerStats) return;

    (match.homeLineup || []).forEach(pid=>{
        const stats = match.playerStats[pid];
        if(!stats) return;

        homeGoals += stats.goals || 0;
        homeOwnGoals += stats.ownGoals || 0;
    });

    (match.awayLineup || []).forEach(pid=>{
        const stats = match.playerStats[pid];
        if(!stats) return;

        awayGoals += stats.goals || 0;
        awayOwnGoals += stats.ownGoals || 0;
    });

    match.homeScore = homeGoals + awayOwnGoals;
    match.awayScore = awayGoals + homeOwnGoals;

    // ===== HOKEJ NÁJEZDY =====
    if(match.shootout){
        if(match.homeScore === match.awayScore){
            match.homeScore += 1;
        }
    }

    match.status = "played";
}

function rebuildPlayerStats(data){

    // ===== RESET =====
    data.sports.forEach(sport=>{
        sport.leagues?.forEach(league=>{
            league.teams?.forEach(team=>{
                team.players?.forEach(player=>{

                    player.stats.total = {
                        matches:0,
                        minutes:0,
                        goals:0,
                        ownGoals:0,
                        assists:0,
                        yellow:0,
                        red:0,
                        ratingSum:0,
                        avgRating:0
                    };

                    player.stats.seasons = {};
                });
            });
        });
    });


    // ===== SBĚR DAT ZE ZÁPASŮ =====
    data.sports.forEach(sport=>{
        sport.leagues?.forEach(league=>{
            league.seasons?.forEach(season=>{
                season.rounds?.forEach(round=>{
                    round.matches?.forEach(match=>{

                        if(match.status !== "played") return;
                        if(!match.playerStats) return;

                        const seasonId = season.id;

                        league.teams.forEach(team=>{
                            team.players.forEach(player=>{

                                const stats = match.playerStats[player.id];
                                if(!stats) return;

                                // ===== INIT SEASON =====
                                if(!player.stats.seasons[seasonId]){
                                   player.stats.seasons[seasonId] = {
                                   matches:0,
                                   minutes:0,
                                   goals:0,
                                   ownGoals:0,
                                   assists:0,
                                   yellow:0,
                                   red:0,
                                   passesMade:0,
                                   passesTotal:0,
                                   xg:0,

                                  // hokej
                                  shots:0,
                                  plusMinus:0,
                                  penaltyMinutes:0,
                                  faceoffsTotal:0,
                                  faceoffsWon:0
                                  };
                                }
                                // ===== TOTAL =====
                                player.stats.total.matches += 1;
                                player.stats.total.minutes += stats.minutes || 0;
                                player.stats.total.goals += stats.goals || 0;
                                player.stats.total.ownGoals += stats.ownGoals || 0;
                                player.stats.total.assists += stats.assists || 0;
                                player.stats.total.yellow += stats.yellow || 0;
                                player.stats.total.red += stats.red || 0;

                                // 🔥 rating bereme vždy pokud existuje
                                if(stats.rating !== undefined){
                                    player.stats.total.ratingSum += stats.rating;
                                }

                                // ===== SEASON =====
                                player.stats.seasons[seasonId].matches += 1;
                                player.stats.seasons[seasonId].minutes += stats.minutes || 0;
                                player.stats.seasons[seasonId].goals += stats.goals || 0;
                                player.stats.seasons[seasonId].ownGoals += stats.ownGoals || 0;
                                player.stats.seasons[seasonId].assists += stats.assists || 0;
                                player.stats.seasons[seasonId].yellow += stats.yellow || 0;
                                player.stats.seasons[seasonId].red += stats.red || 0;
                                player.stats.seasons[seasonId].passesMade += stats.passesMade || 0;
                                player.stats.seasons[seasonId].passesTotal += stats.passesTotal || 0;
                                player.stats.seasons[seasonId].xg += stats.xg || 0;
                                player.stats.seasons[seasonId].shots += stats.shots || 0;
                                player.stats.seasons[seasonId].plusMinus += stats.plusMinus || 0;
                                player.stats.seasons[seasonId].faceoffsTotal += stats.faceoffsTotal || 0;
                                player.stats.seasons[seasonId].faceoffsWon += stats.faceoffsWon || 0;
                                player.stats.seasons[seasonId].penaltyMinutes += stats.penaltyMinutes || 0;
                            });
                        });

                    });
                });
            });
        });
    });


    // ===== VÝPOČET PRŮMĚRU RATINGU =====
    data.sports.forEach(sport=>{
        sport.leagues?.forEach(league=>{
            league.teams?.forEach(team=>{
                team.players?.forEach(player=>{

                    const total = player.stats.total;

                    if(total.matches > 0 && total.ratingSum > 0){
                        total.avgRating = total.ratingSum / total.matches;
                    }else{
                        total.avgRating = 0;
                    }

                });
            });
        });
    });

}



function rebuildTeamStats(data){

data.sports.forEach(sport=>{
sport.leagues?.forEach(league=>{

// reset statistik týmů
league.teams?.forEach(team=>{
team.stats = { seasons:{} };
});

league.seasons?.forEach(season=>{
const seasonId = season.id;

// init sezony
league.teams.forEach(team=>{
team.stats.seasons[seasonId] = {
played:0,
wins:0,
draws:0,
losses:0,
goalsFor:0,
goalsAgainst:0,
xGFor:0,
xGAgainst:0,
points:0
};
});

season.rounds?.forEach(round=>{
round.matches?.forEach(match=>{

if(match.status !== "played") return;

const homeTeam = league.teams.find(t=>t.id===match.homeTeam);
const awayTeam = league.teams.find(t=>t.id===match.awayTeam);

if(!homeTeam || !awayTeam) return;

let homeXG = 0;
let awayXG = 0;

if(match.playerStats){

(match.homeLineup || []).forEach(pid=>{
homeXG += match.playerStats[pid]?.xg || 0;
});

(match.awayLineup || []).forEach(pid=>{
awayXG += match.playerStats[pid]?.xg || 0;
});

}

const homeStats = homeTeam.stats.seasons[seasonId];
const awayStats = awayTeam.stats.seasons[seasonId];

// zápasy
homeStats.played++;
awayStats.played++;

// góly
homeStats.goalsFor += match.homeScore || 0;
homeStats.goalsAgainst += match.awayScore || 0;

awayStats.goalsFor += match.awayScore || 0;
awayStats.goalsAgainst += match.homeScore || 0;

// xG
homeStats.xGFor += homeXG;
homeStats.xGAgainst += awayXG;

awayStats.xGFor += awayXG;
awayStats.xGAgainst += homeXG;


// ===== FOTBAL =====
if(sport.name === "Fotbal"){

if(match.homeScore > match.awayScore){

homeStats.wins++;
homeStats.points += 3;
awayStats.losses++;

}
else if(match.homeScore < match.awayScore){

awayStats.wins++;
awayStats.points += 3;
homeStats.losses++;

}
else{

homeStats.draws++;
awayStats.draws++;

homeStats.points += 1;
awayStats.points += 1;

}

}


// ===== HOKEJ =====
else if(sport.name === "Hokej"){

// NHL má 2 body za výhru
let winPoints = 3;

// pokud je liga NHL
if(league.name === "NHL"){
winPoints = 2;
}

if(match.homeScore > match.awayScore){

homeStats.wins++;

if(match.overtime || match.shootout){
homeStats.points += 2;
awayStats.points += 1;
}else{
homeStats.points += winPoints;
}

awayStats.losses++;

}
else if(match.homeScore < match.awayScore){

awayStats.wins++;

if(match.overtime || match.shootout){
awayStats.points += 2;
homeStats.points += 1;
}else{
awayStats.points += winPoints;
}

homeStats.losses++;

}

}

});
});

});

});
});
}
async function render(){

    const data=await getData();
    const matchId=getMatchId();
    const result=findMatch(data,matchId);

    if(!result.match){
        document.getElementById("app").innerHTML="Zápas nenalezen";
        return;
    }

    const match=result.match;
    const league=result.league;
    const sport=result.sport;
    
    const homeTeam=league.teams.find(t=>t.id===match.homeTeam);
    const awayTeam=league.teams.find(t=>t.id===match.awayTeam);

   const app=document.getElementById("app");

let resultText = "";

if(match.shootout){
    resultText = " SO";
}
else if(match.overtime){
    resultText = " OT";
}

app.innerHTML=`
<h2>
${homeTeam.name}
${match.homeScore ?? "-"}
:
${match.awayScore ?? "-"}${resultText}
${awayTeam.name}
</h2>
<label>Rozhodčí</label>
<select id="refereeSelect"></select>

<div style="margin-top:10px">

<label>
<input type="checkbox" id="overtime">
Prodloužení
</label>

<br>

<label>
<input type="checkbox" id="shootout">
Nájezdy
</label>

</div>

<h3>Domácí sestava</h3>
        <div id="homePlayers"></div>

        <h3>Hosté</h3>
        <div id="awayPlayers"></div>

        <button id="saveBtn">Uložit změny</button>
    `;

    renderPlayers(homeTeam.players,"homePlayers","homeLineup",match,sport);
    renderPlayers(awayTeam.players,"awayPlayers","awayLineup",match,sport);
    const select = document.getElementById("refereeSelect");

if(!league.referees) league.referees = [];

select.innerHTML = `<option value="">-- nevybrán --</option>`;

league.referees.forEach(r=>{
    const option = document.createElement("option");
    option.value = r.id;
    option.textContent = r.name;
    select.appendChild(option);
});

// pokud už byl uložen
if(match.refereeId){
    select.value = match.refereeId;
}
  document.getElementById("overtime").checked = match.overtime || false;
  document.getElementById("shootout").checked = match.shootout || false;
  document.getElementById("saveBtn").onclick = async ()=>{

    match.refereeId = document.getElementById("refereeSelect").value || null;
    match.overtime = document.getElementById("overtime").checked;
    match.shootout = document.getElementById("shootout").checked;
    
    if(!match.playerStats) match.playerStats={};

    document
    .querySelectorAll("#homePlayers .card, #awayPlayers .card")
    .forEach(row=>{

        const checkbox = row.querySelector("input[type=checkbox]");
        if(!checkbox || !checkbox.checked) return;

        const playerId = row.dataset.playerId;

       const inputs = row.querySelectorAll("input:not([type=checkbox])");

      let keys;

if(sport.name === "Hokej"){

keys=[
"minutes",
"goals",
"assists",
"plusMinus",
"shots",
"penaltyMinutes",
"faceoffsTotal",
"faceoffsWon"
];

}else{

keys=[
"minutes",
"goals",
"ownGoals",
"assists",
"yellow",
"red",
"rating",
"shots",
"xg",
"passesMade",
"passesTotal"
];

}

        const stats = {};

        inputs.forEach((input,i)=>{

if(input.value !== ""){

let raw = input.value.trim();

if(keys[i] === "minutes" && sport.name === "Hokej"){

if(raw.includes(":")){

let parts = raw.split(":");
let min = Number(parts[0]) || 0;
let sec = Number(parts[1]) || 0;

stats[keys[i]] = (min * 60) + sec;

}else{

stats[keys[i]] = Number(raw) || 0;

}

}else{

raw = raw.replace(",", ".");
stats[keys[i]] = Number(raw) || 0;

}

}

});

        if(Object.keys(stats).length > 0){
            match.playerStats[playerId] = stats;
        }else{
            delete match.playerStats[playerId];
        }

    });

    calculateScore(match);

rebuildPlayerStats(data);
rebuildTeamStats(data);

await saveData(data);
window.location.href="zapasy.html";
};
}

function renderPlayers(players,containerId,lineupKey,match,sport){

    const container=document.getElementById(containerId);
    container.innerHTML="";

    if(!match[lineupKey]) match[lineupKey]=[];
    if(!match.playerStats) match.playerStats={};

    players
    .slice()
    .sort((a,b)=>a.name.localeCompare(b.name,"cs"))
    .forEach(p=>{

        

        const row=document.createElement("div");
        row.className="card";
        if(p.status==="injured"){
        row.style.opacity="0.6";
        }

        if(p.status==="suspended"){
        row.style.opacity="0.6";
        row.style.border="1px solid #ff9f43";
        }
        row.dataset.playerId = p.id;
        const top=document.createElement("div");
        top.style.display="flex";
        top.style.alignItems="center";
        top.style.gap="10px";

        const checkbox=document.createElement("input");
        checkbox.type="checkbox";
        checkbox.checked=match[lineupKey].includes(p.id);

        const name=document.createElement("div");
        name.innerText=p.name;

        top.appendChild(checkbox);
        top.appendChild(name);
        row.appendChild(top);

        const statsDiv=document.createElement("div");
        statsDiv.style.display="none";
        statsDiv.style.flexWrap="wrap";
        statsDiv.style.gap="6px";
        statsDiv.style.marginTop="8px";

       let fields;

if(sport.name === "Hokej"){

fields=[
    {key:"minutes",ph:"MM:SS"},
    {key:"goals",ph:"G"},
    {key:"assists",ph:"A"},
    {key:"plusMinus",ph:"+/-"},
    {key:"shots",ph:"Stř"},
    {key:"penaltyMinutes",ph:"TM"},   // 🔥 trestné minuty
    {key:"faceoffsTotal",ph:"Buly"},
    {key:"faceoffsWon",ph:"Buly✓"}
];

}else{

fields=[
    {key:"minutes",ph:"Min"},
    {key:"goals",ph:"G"},
    {key:"ownGoals",ph:"OG"},
    {key:"assists",ph:"A"},
    {key:"yellow",ph:"🟨"},
    {key:"red",ph:"🟥"},
    {key:"rating",ph:"⭐",step:"0.1"},
    {key:"shots",ph:"Stř"},
    {key:"xg",ph:"xG",step:"0.01"},
    {key:"passesMade",ph:"P✓"},
    {key:"passesTotal",ph:"PΣ"}
];

}
        const inputs={};

        fields.forEach(f=>{
            const input=document.createElement("input");
            if(sport.name === "Hokej" && f.key === "minutes"){
    input.type="text";
}else{
    input.type="number";
}
            if(f.step) input.step=f.step;
            input.placeholder=f.ph;
            input.style.width="60px";
            statsDiv.appendChild(input);
            inputs[f.key]=input;
        });

        row.appendChild(statsDiv);
  
     // ===== NAČTENÍ ULOŽENÝCH STATISTIK =====
if(match.playerStats?.[p.id]){

   Object.keys(inputs).forEach(key=>{

let val = match.playerStats[p.id][key];

if(val === undefined) return;

// ===== HOKEJ ČAS =====
if(key === "minutes" && sport.name === "Hokej"){

let min = Math.floor(val / 60);
let sec = val % 60;

inputs[key].value = min + ":" + String(sec).padStart(2,"0");

}else{

inputs[key].value = val;

}

});

    // zobraz statistiky pokud už hráč byl vybrán
    statsDiv.style.display = "flex";
    row.style.background = "#163a1f";
    row.style.border = "1px solid #2ecc71";
}
   
        function updateStyle(){
            if(checkbox.checked){
                row.style.background="#163a1f";
                row.style.border="1px solid #2ecc71";
                statsDiv.style.display="flex";
            }else{
                row.style.background="#1b1b1b";
                row.style.border="none";
                statsDiv.style.display="none";
            }
        }

        updateStyle();

        checkbox.onchange=()=>{
            if(checkbox.checked){
                match[lineupKey].push(p.id);
            }else{
                match[lineupKey]=match[lineupKey].filter(id=>id!==p.id);
                delete match.playerStats[p.id];
            }
            updateStyle();
        };

        

        container.appendChild(row);
    });

}
await render();

</script>
