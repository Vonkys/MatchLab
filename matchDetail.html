async function saveMatchToNewStructure(match, league, sport){

leagueId: league.id,

roundNumber: match.roundNumber ?? null,

date: match.date || null,
status: match.status || "scheduled",

awayTeam: match.awayTeam,

awayScore: match.awayScore ?? null,

awayLineup: match.awayLineup || [],

function calculateMatchXG(match){

let homeXG = 0;
let awayXG = 0;

if(!match.playerStats){
return {home:0, away:0};
}

(match.homeLineup || []).forEach(pid=>{
homeXG += match.playerStats[pid]?.xg || 0;
});

(match.awayLineup || []).forEach(pid=>{
awayXG += match.playerStats[pid]?.xg || 0;
});

return {
home: homeXG,
away: awayXG
};

}

function calculateScore(match){

    let homeGoals = 0;
    let awayGoals = 0;

    let homeOwnGoals = 0;
    let awayOwnGoals = 0;

    if(!match.playerStats || Object.keys(match.playerStats).length === 0){

    match.homeScore = null;
    match.awayScore = null;
    match.status = "scheduled";

    return;
}

    (match.homeLineup || []).forEach(pid=>{
        const stats = match.playerStats[pid];
        if(!stats) return;

        homeGoals += stats.goals || 0;
        homeOwnGoals += stats.ownGoals || 0;
    });

    (match.awayLineup || []).forEach(pid=>{
        const stats = match.playerStats[pid];
        if(!stats) return;

        awayGoals += stats.goals || 0;
        awayOwnGoals += stats.ownGoals || 0;
    });

    match.homeScore = homeGoals + awayOwnGoals;
    match.awayScore = awayGoals + homeOwnGoals;

    // ===== SHOOTOUT REAL RESULT =====
if(match.shootout && match.shootoutLog){

let homeSO = 0;
let awaySO = 0;

match.shootoutLog.forEach(r=>{
if(r.home.goal) homeSO++;
if(r.away.goal) awaySO++;
});

if(homeSO > awaySO){
match.homeScore += 1;
match.shootoutWinner = "home";
}
else if(awaySO > homeSO){
match.awayScore += 1;
match.shootoutWinner = "away";
}else{
match.shootoutWinner = null;
}

}
  
match.status = "played";
}



function rebuildTeamStats(data){

data.sports.forEach(sport=>{
sport.leagues?.forEach(league=>{

if(!league.teams || !Array.isArray(league.teams)){
return;
}

// reset statistik týmů
league.teams?.forEach(team=>{
team.stats = { seasons:{} };
});

league.seasons?.forEach(season=>{
const seasonId = season.id;

// init sezony
league.teams.forEach(team=>{
team.stats.seasons[seasonId] = {
played:0,
wins:0,
draws:0,
losses:0,
goalsFor:0,
goalsAgainst:0,
xGFor:0,
xGAgainst:0,
points:0
};
});

season.rounds?.forEach(round=>{
round.matches?.forEach(match=>{

if(match.status !== "played") return;

const homeTeam = league.teams.find(t=>t.id===match.homeTeam);
const awayTeam = league.teams.find(t=>t.id===match.awayTeam);

if(!homeTeam || !awayTeam) return;

updateTeamElo(homeTeam, awayTeam, match.homeScore, match.awayScore);

let homeXG = 0;
let awayXG = 0;

if(match.playerStats){

(match.homeLineup || []).forEach(pid=>{
homeXG += match.playerStats[pid]?.xg || 0;
});

(match.awayLineup || []).forEach(pid=>{
awayXG += match.playerStats[pid]?.xg || 0;
});

}

const homeStats = homeTeam.stats.seasons[seasonId];
const awayStats = awayTeam.stats.seasons[seasonId];

// zápasy
homeStats.played++;
awayStats.played++;

// góly
homeStats.goalsFor += match.homeScore || 0;
homeStats.goalsAgainst += match.awayScore || 0;

awayStats.goalsFor += match.awayScore || 0;
awayStats.goalsAgainst += match.homeScore || 0;

// xG
homeStats.xGFor += homeXG;
homeStats.xGAgainst += awayXG;

awayStats.xGFor += awayXG;
awayStats.xGAgainst += homeXG;


// ===== FOTBAL =====
if(sport.name === "Fotbal"){

if(match.homeScore > match.awayScore){

homeStats.wins++;
homeStats.points += 3;
awayStats.losses++;

}
else if(match.homeScore < match.awayScore){

awayStats.wins++;
awayStats.points += 3;
homeStats.losses++;

}
else{

homeStats.draws++;
awayStats.draws++;

homeStats.points += 1;
awayStats.points += 1;

}

}


// ===== HOKEJ =====
else if(sport.name === "Hokej"){

// NHL má 2 body za výhru
let winPoints = 3;

// pokud je liga NHL
if(league.name === "NHL"){
winPoints = 2;
}

if(match.homeScore > match.awayScore){

homeStats.wins++;

if(match.overtime || match.shootout){
homeStats.points += 2;
awayStats.points += 1;
}else{
homeStats.points += winPoints;
}

awayStats.losses++;

}
else if(match.homeScore < match.awayScore){

awayStats.wins++;

if(match.overtime || match.shootout){
awayStats.points += 2;
homeStats.points += 1;
}else{
awayStats.points += winPoints;
}

homeStats.losses++;

}

}

});
});

});

});
});
}


function updateTeamElo(homeTeam, awayTeam, homeScore, awayScore){

const K = 20;

if(homeTeam.elo === undefined) homeTeam.elo = 1500;
if(awayTeam.elo === undefined) awayTeam.elo = 1500;

let homeElo = homeTeam.elo;
let awayElo = awayTeam.elo;

// expected score
const expectedHome = 1 / (1 + Math.pow(10,(awayElo-homeElo)/400));
const expectedAway = 1 / (1 + Math.pow(10,(homeElo-awayElo)/400));

// actual result
let resultHome;
let resultAway;

if(homeScore > awayScore){
    resultHome = 1;
    resultAway = 0;
}
else if(homeScore < awayScore){
    resultHome = 0;
    resultAway = 1;
}
else{
    resultHome = 0.5;
    resultAway = 0.5;
}

// new elo
homeTeam.elo = Math.round(homeElo + K * (resultHome - expectedHome));
awayTeam.elo = Math.round(awayElo + K * (resultAway - expectedAway));

}


async function recomputeStatsForPlayers(playerIds, leagueId){

const matchesSnap = await getDocs(
collection(db,"matches",leagueId,"list")
);

let totals = {};

playerIds.forEach(pid=>{
totals[pid] = {
matches:0,
minutes:0,
goals:0,
assists:0,
shots:0,
yellow:0,
red:0,
xg:0,
passesMade:0,
passesTotal:0,
ratingSum:0,
plusMinus:0,
penaltyMinutes:0,
faceoffsTotal:0,
faceoffsWon:0,
saves:0,
shotsAgainst:0,
shootoutAttempts:0,
shootoutGoals:0,
};
});

matchesSnap.forEach(docSnap=>{

const m = docSnap.data();
if(m.status !== "played") return;
if(!m.playerStats) return;

playerIds.forEach(pid=>{

const s = m.playerStats[pid];
if(!s) return;

let t = totals[pid];

// ⭐ nájezdy
if(m.shootout && m.shootoutLog){
m.shootoutLog.forEach(r=>{
if(r.home?.playerId === pid){
t.shootoutAttempts++;
if(r.home.goal) t.shootoutGoals++;
}
if(r.away?.playerId === pid){
t.shootoutAttempts++;
if(r.away.goal) t.shootoutGoals++;
}
});
}

// ⭐ klasické stats
// 🔥 zápas se počítá když je hráč v sestavě
if(
(m.homeLineup || []).includes(pid) ||
(m.awayLineup || []).includes(pid)
){
t.matches++;
}
t.minutes += s.minutes || 0;
t.goals += s.goals || 0;
t.assists += s.assists || 0;
t.yellow += s.yellow || 0;
t.red += s.red || 0;
t.shots += s.shots || 0;
t.xg += s.xg || 0;
t.passesMade += s.passesMade || 0;
t.passesTotal += s.passesTotal || 0;

t.plusMinus += s.plusMinus || 0;
t.penaltyMinutes += s.penaltyMinutes || 0;
t.faceoffsTotal += s.faceoffsTotal || 0;
t.faceoffsWon += s.faceoffsWon || 0;
t.saves += s.saves || 0;
t.shotsAgainst += s.shotsAgainst || 0;

if(s.rating !== undefined){
t.ratingSum += s.rating;
}

});

});

let batch = writeBatch(db);

for(const pid of playerIds){

let ref = doc(db,"players",pid);
let snap = await getDoc(ref);
if(!snap.exists()) continue;

let player = snap.data();
let t = totals[pid];

t.avgRating = t.matches>0 ? t.ratingSum/t.matches : 0;
t.passSuccess = t.passesTotal>0 ? (t.passesMade/t.passesTotal)*100 : 0;
t.faceoffPct = t.faceoffsTotal>0 ? (t.faceoffsWon/t.faceoffsTotal)*100 : 0;
t.savePct = t.shotsAgainst>0 ? (t.saves/t.shotsAgainst)*100 : 0;
t.shootoutPct = t.shootoutAttempts>0 ? (t.shootoutGoals/t.shootoutAttempts)*100 : 0;

if(!player.stats) player.stats = {};
player.stats.total = t;

batch.set(ref, player);

}

await batch.commit();

}

...stats
};

    });

  calculateScore(match);


await saveMatchToNewStructure(match, league, sport);

const affectedPlayers = [
...(match.homeLineup || []),
...(match.awayLineup || [])
];

await recomputeStatsForPlayers(affectedPlayers, league.id);


window.location.href = "zapasy.html";
};
}
function renderPlayers(players,containerId,lineupKey,match,sport){

    const alphabetContainer =
containerId === "homePlayers"
? document.getElementById("homeAlphabet")
: document.getElementById("awayAlphabet");

alphabetContainer.innerHTML = "";
    
    const container=document.getElementById(containerId);
    container.innerHTML="";

    if(!match[lineupKey]) match[lineupKey]=[];
    if(!match.playerStats) match.playerStats={};

    const grouped = {};

players
.sort((a,b)=>a.name.localeCompare(b.name,"cs"))
.forEach(p=>{
    const letter = p.name.charAt(0).toUpperCase();

    if(!grouped[letter]) grouped[letter] = [];
    grouped[letter].push(p);
});

Object.keys(grouped).forEach(letter=>{

const btn = document.createElement("div");
btn.innerText = letter;
btn.style.cursor = "pointer";
btn.style.padding = "2px 0";
btn.onmouseenter = ()=> btn.style.color = "#2ecc71";
btn.onmouseleave = ()=> btn.style.color = "";
btn.onclick = ()=>{

const header =
container.querySelector('[data-letter="'+letter+'"]');

if(!header) return;

// 🔥 přesná pozice uvnitř scrollboxu
const y =
header.getBoundingClientRect().top -
container.getBoundingClientRect().top +
container.scrollTop;

// malý offset aby header nebyl nalepenej
container.scrollTo({
top: y - 4,
behavior:"smooth"
});

};

alphabetContainer.appendChild(btn);

});

Object.keys(grouped).forEach(letter=>{

    const header = document.createElement("div");
    header.dataset.letter = letter;
    header.innerText = letter;
    header.style.position = "relative";
    header.style.background = "#0f0f0f";
    header.style.padding = "4px 8px";
    header.style.marginTop = "6px";
    header.style.fontWeight = "bold";
    header.style.borderBottom = "1px solid #333";
    header.style.zIndex = "5";

    container.appendChild(header);

    grouped[letter].forEach(p=>{

        

        const row=document.createElement("div");
        row.className="card";
        if(p.status==="injured"){
        row.style.opacity="0.6";
        }

        if(p.status==="suspended"){
        row.style.opacity="0.6";
        row.style.border="1px solid #ff9f43";
        }
        row.dataset.playerId = p.id;
        row.dataset.position = p.position;
        const top=document.createElement("div");
        top.style.display="flex";
        top.style.alignItems="center";
        top.style.gap="10px";

        const checkbox=document.createElement("input");
        checkbox.type="checkbox";
        checkbox.checked = (match[lineupKey] || []).includes(p.id);

        const name=document.createElement("div");
        name.innerText=p.name;

        top.appendChild(checkbox);
        top.appendChild(name);
        row.appendChild(top);

        const statsDiv=document.createElement("div");
        statsDiv.style.display="none";
        statsDiv.style.flexWrap="wrap";
        statsDiv.style.gap="6px";
        statsDiv.style.marginTop="8px";

     let fields;

if(sport.name === "Hokej"){

    // ===== BRANKÁŘ =====
    if(p.position === "GK"){

fields=[
    {key:"minutes",ph:"MMSS"},
    {key:"saves",ph:"Zák"},
    {key:"shotsAgainst",ph:"Stř↓"}
];

    }

    // ===== HRÁČI V POLI =====
    else{

        fields=[
    {key:"minutes",ph:"MMSS"},
    {key:"goals1P",ph:"G1"},
    {key:"goals2P",ph:"G2"},
    {key:"goals3P",ph:"G3"},
    {key:"goalsOT",ph:"G OT"},
    {key:"ownGoals",ph:"OG"},
    {key:"assists",ph:"A"},
    {key:"plusMinus",ph:"+/-"},
    {key:"shots",ph:"Stř"},
    {key:"penaltyMinutes",ph:"TM"},
    {key:"faceoffsTotal",ph:"Buly"},
    {key:"faceoffsWon",ph:"Buly✓"}
];

    }

}

else{

    // ===== FOTBAL =====
fields=[
    {key:"minutes",ph:"Min"},
    {key:"goals1H",ph:"G1"},
    {key:"goals2H",ph:"G2"},
    {key:"ownGoals",ph:"OG"},
    {key:"assists",ph:"A"},
    {key:"yellow",ph:"🟨"},
    {key:"red",ph:"🟥"},
    {key:"rating",ph:"⭐",step:"0.1"},
    {key:"shots",ph:"Stř"},
    {key:"xg",ph:"xG",step:"0.01"},
    {key:"passesMade",ph:"P✓"},
    {key:"passesTotal",ph:"PΣ"}
];

}
        const inputs={};

        fields.forEach(f=>{
            const input=document.createElement("input");
            if(sport.name === "Hokej" && f.key === "minutes"){
    input.type="text";
}else{
    input.type="number";
}
            
if(sport.name === "Hokej" && f.key === "minutes"){

input.onblur = ()=>{

let raw = input.value.trim();
if(!raw) return;

// 🔥 dovolí 30,21 30.21 3021 5
raw = raw.replace(",",":").replace(".",":");

if(raw.includes(":")){

let parts = raw.split(":");

let min = Number(parts[0]) || 0;
let sec = Number(parts[1]) || 0;

sec = Math.min(sec,59);

input.value = min + ":" + String(sec).padStart(2,"0");

}
else if(raw.length >= 3){

let min = Number(raw.slice(0,-2)) || 0;
let sec = Number(raw.slice(-2)) || 0;

sec = Math.min(sec,59);

input.value = min + ":" + String(sec).padStart(2,"0");

}
else{

let min = Number(raw) || 0;
input.value = min + ":00";

}

};
}
            
            if(f.step) input.step=f.step;
            input.placeholder=f.ph;
            input.style.width="60px";
            statsDiv.appendChild(input);
            inputs[f.key]=input;
        });

        row.appendChild(statsDiv);
  
     // ===== NAČTENÍ ULOŽENÝCH STATISTIK =====
if(match.playerStats?.[p.id]){

Object.keys(inputs).forEach(key=>{

let val = match.playerStats[p.id][key];




if(val === undefined) return;

// ===== HOKEJ ČAS =====
if(key === "minutes" && sport.name === "Hokej"){

let min = Math.floor(val / 60);
let sec = val % 60;

inputs[key].value = min + ":" + String(sec).padStart(2,"0");

}else{

inputs[key].value = val;

}

});

    // zobraz statistiky pokud už hráč byl vybrán
    statsDiv.style.display = "flex";
    row.style.background = "#163a1f";
    row.style.border = "1px solid #2ecc71";
}
   
        function updateStyle(){
            if(checkbox.checked){
                row.style.background="#163a1f";
                row.style.border="1px solid #2ecc71";
                statsDiv.style.display="flex";
            }else{
                row.style.background="#1b1b1b";
                row.style.border="none";
                statsDiv.style.display="none";
            }
        }

        updateStyle();

        checkbox.onchange=()=>{
            if(checkbox.checked){
                match[lineupKey].push(p.id);
            }else{
                match[lineupKey]=match[lineupKey].filter(id=>id!==p.id);
                delete match.playerStats[p.id];
            }
            updateStyle();
        };

        

       container.appendChild(row);
});
});

}

function renderShootout(match,homeTeam,awayTeam){

const wrap = document.getElementById("shootoutList");
wrap.innerHTML="";

// 🔥 MIGRACE STARÉ STRUKTURY
if(match.shootoutLog && match.shootoutLog.length > 0){
if(match.shootoutLog[0].team){

let rounds = [];

match.shootoutLog.forEach(s=>{
let last = rounds[rounds.length-1];

if(!last || last[s.team]){
last = {
home:{playerId:null,goal:false},
away:{playerId:null,goal:false}
};
rounds.push(last);
}

last[s.team] = {
playerId:s.playerId || null,
goal:s.goal || false
};
});

match.shootoutLog = rounds;
}
}

(match.shootoutLog || []).forEach((round,i)=>{

const row=document.createElement("div");
row.className="card";
row.style.display="flex";
row.style.flexDirection="row";
row.style.gap="10px";

function renderSide(side,teamObj){

const col=document.createElement("div");
col.style.flex="1";
col.style.display="flex";
col.style.flexDirection="row";
col.style.alignItems="center";
col.style.gap="6px";

const playerSel=document.createElement("select");
playerSel.style.flex="1";

// prázdná volba
const empty = document.createElement("option");
empty.value = "";
empty.textContent = "-- hráč --";
playerSel.appendChild(empty);

teamObj.forEach(p=>{
const o=document.createElement("option");
o.value=p.id;
o.textContent=p.name;
playerSel.appendChild(o);
});

playerSel.value = round[side].playerId || "";

playerSel.onchange=()=>{

round[side].playerId = playerSel.value;

// reset goal stav když měníš hráče
round[side].goal = false;
goalChk.checked = false;

if(playerSel.value){
col.style.background = "#3a1616";
col.style.border = "1px solid #e74c3c";
}else{
col.style.background = "";
col.style.border = "";
round[side].goal = null;
}

};

const goalChk=document.createElement("input");
goalChk.type="checkbox";
goalChk.checked = round[side].goal === true;

if(round[side].goal === true){
col.style.background = "#163a1f";
col.style.border = "1px solid #2ecc71";
}

if(round[side].goal === false && round[side].playerId){
col.style.background = "#3a1616";
col.style.border = "1px solid #e74c3c";
}


goalChk.onclick = ()=>{

if(!round[side].playerId) return;

if(round[side].goal === true){
round[side].goal = false;

col.style.background = "#3a1616";
col.style.border = "1px solid #e74c3c";

goalChk.checked = false;

}
else if(round[side].goal === false){
round[side].goal = null;

col.style.background = "";
col.style.border = "";

goalChk.checked = false;

}
else{
round[side].goal = true;

col.style.background = "#163a1f";
col.style.border = "1px solid #2ecc71";

goalChk.checked = true;
}

};

col.appendChild(playerSel);
col.appendChild(goalChk);

return col;
}

row.appendChild(renderSide("home",homeTeam));
row.appendChild(renderSide("away",awayTeam));

const del=document.createElement("button");
del.style.width="40px";
del.style.padding="6px";
del.style.marginLeft="6px";
del.textContent="✖";
del.style.marginTop="10px";

del.onclick=()=>{
match.shootoutLog.splice(i,1);
renderShootout(match,homeTeam,awayTeam);
};

row.appendChild(del);
wrap.appendChild(row);

});

}

await render();
