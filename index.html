<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MatchLab</title>

<style>

/* ===== RESET ===== */

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

/* ===== BODY ===== */

body {
    font-family: system-ui, Arial, sans-serif;
    background: radial-gradient(circle at top, #141414, #060606);
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
}

/* ===== HEADER ===== */

.header {
    margin-top: 70px;
    text-align: center;
}

.title {
    font-size: 38px;
    letter-spacing: 4px;
    font-weight: 700;
    text-shadow: 0 0 15px rgba(255,255,255,0.15);
}

.subtitle {
    margin-top: 8px;
    font-size: 14px;
    color: #9a9a9a;
    letter-spacing: 1px;
}

/* ===== MENU ===== */

.menu {
    margin-top: 60px;
    width: 100%;
    max-width: 360px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 18px;
}
/* ===== TOP BAR ===== */

.topbar {
    position: sticky;
    top: 0;
    width: 100%;
    padding: 18px;
    text-align: center;

    background: rgba(10,10,10,0.8);
    backdrop-filter: blur(10px);

    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.logo {
    font-size: 20px;
    letter-spacing: 3px;
    font-weight: 700;
}
/* ===== CARDS ===== */

.card {
    padding: 20px;
    border-radius: 14px;

    background: linear-gradient(145deg, #1b1b1b, #101010);
    border: 1px solid rgba(255,255,255,0.06);

    font-size: 18px;
    text-align: center;
    cursor: pointer;

    transition: all .25s ease;
}

.card:hover {
    transform: translateY(-4px);
    background: #1f1f1f;
    box-shadow:
        0 12px 25px rgba(0,0,0,.6),
        0 0 12px rgba(255,255,255,.05);
}

.card:active {
    transform: scale(.97);
}

/* ===== FOOTER ===== */

.footer {
    margin-top: auto;
    margin-bottom: 20px;
    font-size: 12px;
    color: #666;
}

</style>
</head>

<body>

<!-- HEADER -->
    <div class="topbar">
    <div class="logo">MATCHLAB</div>
</div>
    <div class="title">MATCHLAB</div>
    <div class="subtitle">Football & Hockey Prediction Engine</div>
</div>

<!-- MENU -->
<div class="menu">
    <div class="card" onclick="goTo('tymy')">
        📚 Týmy
    </div>
   
    <div class="card" onclick="goTo('zapasy')">
        📅 Zápasy
    </div>
   
    <div class="card" onclick="goTo('predikce')">
        📊 Predikce
    </div>

    <div class="card" onclick="goTo('tabulky')">
        ➕ Tabulky
    </div>

  

</div>

<div class="footer">
    MatchLab v0.1
</div>

<script>

function goTo(page){
    window.location.href = page + ".html";
}

</script>

</body>
</html>
