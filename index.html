<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MatchLab</title>

<style>

/* ===== RESET ===== */

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

/* ===== BODY ===== */

body {
    font-family: system-ui, Arial, sans-serif;
    background: radial-gradient(circle at top, #141414, #060606);
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
}

/* ===== HEADER ===== */

.header {
    margin-top: 70px;
    text-align: center;
}

.title {
    font-size: 38px;
    letter-spacing: 4px;
    font-weight: 700;
    text-shadow: 0 0 15px rgba(255,255,255,0.15);
}

.subtitle {
    margin-top: 8px;
    font-size: 14px;
    color: #9a9a9a;
    letter-spacing: 1px;
}

/* ===== MENU ===== */

.menu {
    margin-top: 60px;
    width: 100%;
    max-width: 360px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 18px;
}
/* ===== TOP BAR ===== */

.topbar {
    position: sticky;
    top: 0;
    width: 100%;
    padding: 18px;
    text-align: center;

    background: rgba(10,10,10,0.8);
    backdrop-filter: blur(10px);

    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.logo {
    font-size: 16px;
    letter-spacing: 3px;
    font-weight: 700;
}
/* ===== CARDS ===== */

.card {
    padding: 20px;
    border-radius: 14px;

    background: linear-gradient(145deg, #1b1b1b, #101010);
    border: 1px solid rgba(255,255,255,0.06);

    font-size: 18px;
    text-align: center;
    cursor: pointer;

    transition: all .25s ease;
}

.card:hover {
    transform: translateY(-4px);
    background: #1f1f1f;
    box-shadow:
        0 12px 25px rgba(0,0,0,.6),
        0 0 12px rgba(255,255,255,.05);
}

.card:active {
    transform: scale(.97);
}

/* ===== FOOTER ===== */

.footer {
    margin-top: auto;
    margin-bottom: 20px;
    font-size: 12px;
    color: #666;
}
body{
display:none;
}
</style>
</head>

<body>

<!-- HEADER -->
   <div class="topbar">
<div style="display:flex;justify-content:space-between;align-items:center;max-width:420px;margin:auto;">
<div class="logo" id="userEmail"></div>

<div onclick="logout()" style="
cursor:pointer;
font-size:14px;
opacity:0.7;
">
🚪 Logout
</div>

</div>
</div>
    <div class="title">MATCHLAB</div>
    <div class="subtitle">Football & Hockey Prediction Engine</div>
</div>

<!-- MENU -->
<div class="menu">
    <div class="card" onclick="goTo('tymy')">
        📚 Týmy
    </div>
   
    <div class="card" onclick="goTo('zapasy')">
        📅 Zápasy
    </div>
   
     <div class="card" onclick="goTo('tabulky')">
        ➕ Tabulky
    </div>
    
    <div class="card" onclick="goTo('predikce')">
        📊 Predikce
    </div>

   <div class="card" onclick="goTo('fantasy')">
        🏆 Fantasy
    </div>
   
     <div class="card" onclick="goTo('betlab')">
    💰 BetLab
</div> 
</div>

<div class="footer">
    MatchLab v0.1
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyA_bZAUiFIzQYrYTqdVkvF6GliLWbu7WN4",
authDomain: "matchlab-f7fb8.firebaseapp.com",
projectId: "matchlab-f7fb8",
storageBucket: "matchlab-f7fb8.firebasestorage.app",
messagingSenderId: "791469272358",
appId: "1:791469272358:web:3a3502f0b65d68bedb65e7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async (user)=>{

if(!user){
window.location.href="login.html";
return;
}

document.getElementById("userEmail").innerText = user.email;

/* ===== načtení role ===== */

const snap = await getDoc(doc(db,"users",user.uid));
const role = snap.data()?.role || "user";

/* ===== pokud není admin ===== */

/* ===== role menu ===== */

// schovej všechno
document.querySelector('[onclick="goTo(\'tymy\')"]').style.display="none";
document.querySelector('[onclick="goTo(\'zapasy\')"]').style.display="none";
document.querySelector('[onclick="goTo(\'tabulky\')"]').style.display="none";
document.querySelector('[onclick="goTo(\'predikce\')"]').style.display="none";
document.querySelector('[onclick="goTo(\'fantasy\')"]').style.display="none";

// USER → jen tabulky
if(role === "user"){
    document.querySelector('[onclick="goTo(\'tabulky\')"]').style.display="block";
}

// PROFI → tabulky + predikce + fantasy
if(role === "profi"){
    document.querySelector('[onclick="goTo(\'tabulky\')"]').style.display="block";
    document.querySelector('[onclick="goTo(\'predikce\')"]').style.display="block";
    document.querySelector('[onclick="goTo(\'fantasy\')"]').style.display="block";
}

// ADMIN → všechno
if(role === "admin"){
    document.querySelector('[onclick="goTo(\'tymy\')"]').style.display="block";
    document.querySelector('[onclick="goTo(\'zapasy\')"]').style.display="block";
    document.querySelector('[onclick="goTo(\'tabulky\')"]').style.display="block";
    document.querySelector('[onclick="goTo(\'predikce\')"]').style.display="block";
    document.querySelector('[onclick="goTo(\'fantasy\')"]').style.display="block";
}

document.body.style.display="flex";

});



window.goTo = function(page){
window.location.href = page + ".html";
}
window.logout = function(){

signOut(auth)
.then(()=>{
window.location.href="login.html";
});

}

</script>
</body>
</html>
