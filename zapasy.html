/* ================= STORAGE ================= */

async function getData(){

    if(APP_DATA) return APP_DATA;

    const ref = doc(db,"appData","main");
    const snap = await getDoc(ref);

    if(snap.exists()){
        APP_DATA = snap.data();
        return APP_DATA;
    }

    const empty={sports:[]};
    await setDoc(ref,empty);
    APP_DATA = empty;
    return APP_DATA;
}

async function createPrediction(matchId, leagueId, homeTeamId, awayTeamId){

const homeSnap = await getDoc(doc(db,"teams",homeTeamId));
const awaySnap = await getDoc(doc(db,"teams",awayTeamId));

if(!homeSnap.exists() || !awaySnap.exists()) return;

const home = homeSnap.data();
const away = awaySnap.data();

const homeElo = home.elo || 1500;
const awayElo = away.elo || 1500;

const expectedHome = 1 / (1 + Math.pow(10,(awayElo-homeElo)/400));
const expectedAway = 1 - expectedHome;

const draw = 0.25;

const sum = expectedHome + expectedAway + draw;

const prediction = {
matchId,
leagueId,

homeWin: expectedHome / sum,
draw: draw / sum,
awayWin: expectedAway / sum,

expectedHomeGoals: 1.5 + (homeElo - 1500)/1000,
expectedAwayGoals: 1.2 + (awayElo - 1500)/1000,

status: "scheduled",
createdAt: serverTimestamp(),
updatedAt: serverTimestamp()
};

const predId = matchId;

await setDoc(
doc(db,"predictions", predId),
prediction
);

}

async function saveData(data){
    await setDoc(doc(db,"appData","main"), data);
    APP_DATA = data;
}

async function getMatches(leagueId){

    if(MATCHES_CACHE && MATCHES_CACHE[leagueId])
        return MATCHES_CACHE[leagueId];

    const snap = await getDocs(
        collection(db,"matches",leagueId,"list")
    );

    const arr = snap.docs.map(d=>d.data());

    if(!MATCHES_CACHE) MATCHES_CACHE = {};
    MATCHES_CACHE[leagueId] = arr;

    return arr;
}


function generateId(){
    return "id_"+Date.now()+Math.random();

async function fillSeasons(){

const data = await getData();

const sportId = document.getElementById("sportSelect").value;
const leagueId = document.getElementById("leagueSelect").value;

const seasonSelect = document.getElementById("seasonSelect");

seasonSelect.innerHTML =
`<option disabled selected hidden>Vyber sezónu</option>`;

const sport = data.sports.find(s=>s.id===sportId);
const league = sport?.leagues.find(l=>l.id===leagueId);

if(!league) return;

// 🔥 načti zápasy
const matches = await getMatches(leagueId);

// 🔥 vytvoř set sezón které mají zápas
let seasonSet = new Set();
matches.forEach(m=>{
if(m.season) seasonSet.add(m.season);
});

// 🔥 filtruj jen existující sezóny
let realSeasons =
(league.seasons || [])
.filter(s => seasonSet.has(s.id));

realSeasons
.sort((a,b)=>{

const getYear = s=>{
const match = s.name.match(/\d{4}/);
return match ? Number(match[0]) : 0;
};

return getYear(b) - getYear(a);

})
.forEach(s=>{
seasonSelect.innerHTML +=
`<option value="${s.id}">${s.name}</option>`;
});

seasonSelect.innerHTML +=
`<option value="new">➕ Nová sezóna</option>`;

seasonSelect.onchange = ()=>{
const isNew = seasonSelect.value==="new";

document.getElementById("newSeason").style.display =
isNew ? "block":"none";

fillRounds();
};

}
async function fillRounds(){

    const data = await getData();

    const sportId = document.getElementById("sportSelect").value;
    const leagueId = document.getElementById("leagueSelect").value;
    const seasonId = document.getElementById("seasonSelect").value;

    const roundSelect = document.getElementById("roundSelect");
    const dateInput = document.getElementById("date");

    roundSelect.innerHTML =
        `<option disabled selected hidden>Vyber kolo</option>`;

    const sport = data.sports.find(s=>s.id===sportId);
    const league = sport?.leagues.find(l=>l.id===leagueId);
    const season = league?.seasons?.find(s=>s.id===seasonId);

   // 🔥 kola načteme z Firestore zápasů
const matches = await getMatches(leagueId);

let roundSet = new Set();

matches.forEach(m=>{
    if(
        m.leagueId === leagueId &&
        Number(m.roundNumber)
    ){
        roundSet.add(Number(m.roundNumber));
    }
});

[...roundSet]
.sort((a,b)=> b-a)
.forEach(num=>{
    roundSelect.innerHTML +=
        `<option value="${num}">${num}. kolo</option>`;
});

    roundSelect.innerHTML +=
        `<option value="new">➕ Nové kolo</option>`;

    roundSelect.onchange = async ()=>{

        const isNew = roundSelect.value === "new";

        document.getElementById("newRoundNumber").style.display =
            isNew ? "block":"none";

        document.getElementById("newRoundName").style.display =
            isNew ? "block":"none";

        if(isNew){
            dateInput.value = "";
            return;
        }

        const matches = await getMatches(leagueId);

const found = matches.find(m =>
    m.leagueId === leagueId &&
    Number(m.roundNumber) === Number(roundSelect.value)
);

dateInput.value = found?.date || "";
    };
}

/* ================= CREATE MATCH ================= */

window.createMatch=async function(){

    const sportSelect = document.getElementById("sportSelect");
    const leagueSelect = document.getElementById("leagueSelect");
    const dateInput = document.getElementById("date");
    const homeTeam = document.getElementById("homeTeam");
    const awayTeam = document.getElementById("awayTeam");
    const data=await getData();
    const sportId=sportSelect.value;
    const leagueId=leagueSelect.value;
    const sport = data.sports.find(s=>s.id===sportId);
    const league = sport.leagues.find(l=>l.id===leagueId);
    const date = dateInput.value;
    const home=homeTeam.value;
    const away=awayTeam.value;
    const seasonSelect = document.getElementById("seasonSelect");
    const roundSelect = document.getElementById("roundSelect");

let seasonName;
let roundNumber;
let roundName;

// ===== SEZÓNA =====
if(seasonSelect.value==="new"){
    seasonName = document.getElementById("newSeason").value.trim();
}else{
    const seasonObj = league.seasons.find(s=>s.id===seasonSelect.value);
    seasonName = seasonObj.name;
}

// ===== KOLO =====
if(roundSelect.value === "new"){

    roundNumber = document.getElementById("newRoundNumber").value.trim();
    roundName = document.getElementById("newRoundName").value.trim();

}else{

    roundNumber = roundSelect.value;

    // 🔥 vezmeme EXISTUJÍCÍ název kola z main struktury
    let seasonObj = league.seasons.find(s => s.id === seasonSelect.value);

    let existingRound =
        seasonObj?.rounds?.find(r => Number(r.number) === Number(roundNumber));

    roundName = existingRound?.name || (roundNumber + ". kolo");

}

    if(
!sportId ||
!leagueId ||
!seasonName ||
!roundNumber ||
!roundName ||
!date ||
!home ||
!away ||
home===away
){
alert("Vyplň vše");
return;
}

    

    if(!league.seasons) league.seasons=[];

let season = league.seasons.find(s=>s.name===seasonName);

if(!season){
    season={
        id:generateId(),
        name:seasonName,
        rounds:[]
    };
    league.seasons.push(season);
}

let roundObj = season.rounds.find(r=>r.number==roundNumber);

if(!roundObj){
    roundObj={
        id:generateId(),
        number:Number(roundNumber),
        name:roundName,
        matches:[]
    };
    season.rounds.push(roundObj);
}else{
    // 🔥 update názvu pokud už kolo existuje
    roundObj.name = roundName;
}
season.rounds.sort((a,b)=> a.number - b.number);
// uloz datum kola pokud jeste nema
if(!roundObj.date){
    roundObj.date = date;
}
  
const matchId = generateId();

await setDoc(
doc(db,"matches",leagueId,"list",matchId),
{

id: matchId,
sportId: sportId,
leagueId: leagueId,
season: season.id,   // 🔥 TOTO TAM PŘIDEJ
roundNumber: Number(roundNumber),

homeTeam:home,
awayTeam:away,
date,

homeScore:null,
awayScore:null,

overtime:false,
shootout:false,
status:"scheduled"
});

await createPrediction(matchId, leagueId, home, away);

MATCHES_CACHE = null;

await saveData(data);
resetMatchForm();
closeModal();
render();

}

        
async function renderLeagueRounds(league, matches, leagueWrap){

const teamSnap = await getDocs(collection(db,"teams"));
const teamMap = {};

teamSnap.docs.forEach(d=>{
    const t = d.data();
    teamMap[t.id] = t.name;
});

let seasons = {};

matches.forEach(m=>{
    let s = m.season;

    if(!s){
        let lastSeason = league.seasons?.[league.seasons.length - 1];
        s = lastSeason ? lastSeason.id : "noSeason";
    }

    if(!seasons[s]) seasons[s] = [];
    seasons[s].push(m);
});

Object.keys(seasons)
.sort((a,b)=>{

    const getYear = id=>{
        const s = league.seasons?.find(x=>x.id===id);
        if(!s) return 0;
        const m = s.name.match(/\d{4}/);
        return m ? Number(m[0]) : 0;
    };

    return getYear(b) - getYear(a);

})
.forEach((seasonId,index)=>{

    let seasonName = "Sezóna";
    let foundSeason = league.seasons?.find(s=>s.id === seasonId);
    if(foundSeason) seasonName = foundSeason.name;

    const seasonDiv = document.createElement("div");
    seasonDiv.className="card";
    seasonDiv.style.display="flex";
    seasonDiv.style.justifyContent="space-between";
    seasonDiv.style.alignItems="center";

    const seasonTitle = document.createElement("div");
    seasonTitle.innerHTML = "▶ " + seasonName;
    seasonTitle.style.cursor="pointer";
    seasonTitle.style.flex="1";

    const seasonDelete = document.createElement("div");
    seasonDelete.innerText = "✖";
    seasonDelete.style.color = "#ff6b6b";
    seasonDelete.style.cursor = "pointer";

    const seasonWrap = document.createElement("div");
    seasonWrap.style.display = index === 0 ? "block" : "none";
    seasonWrap.style.marginLeft="15px";

    seasonTitle.onclick = ()=>{
        seasonWrap.style.display =
        seasonWrap.style.display==="none" ? "block" : "none";
    };

    seasonDelete.onclick = async (e)=>{
        e.stopPropagation();
        await deleteSeason(league.id, seasonId);
    };

    seasonDiv.appendChild(seasonTitle);
    seasonDiv.appendChild(seasonDelete);

    leagueWrap.appendChild(seasonDiv);
    leagueWrap.appendChild(seasonWrap);

    // ===== kola
    let rounds = {};

    seasons[seasonId].forEach(m=>{
        let r = m.roundNumber ?? "ostatní";
        if(!rounds[r]) rounds[r] = [];
        rounds[r].push(m);
    });

    Object.keys(rounds)
    .sort((a,b)=> b-a)
    .forEach(roundNumber=>{

        const roundDiv = document.createElement("div");
        roundDiv.className="card";
        roundDiv.style.display="flex";
        roundDiv.style.justifyContent="space-between";
        roundDiv.style.alignItems="center";

        const roundTitle = document.createElement("div");
        roundTitle.ondblclick = async ()=>{
    const newName = prompt("Nový název kola:", roundName);

    if(!newName) return;

    await updateRoundName(league.id, seasonId, roundNumber, newName);
};
        
        let roundObj =
        league.seasons
        ?.find(s => s.id === seasonId)
        ?.rounds
        ?.find(r => Number(r.number) === Number(roundNumber));

        let roundName =
        roundObj?.name || (roundNumber + ". kolo");

        roundTitle.innerHTML = "▶ " + roundName;
        roundTitle.style.cursor="pointer";
        roundTitle.style.flex="1";

        const roundDelete = document.createElement("div");
        roundDelete.innerText = "✖";
        roundDelete.style.color = "#ff6b6b";
        roundDelete.style.cursor = "pointer";

        const roundWrap = document.createElement("div");
        roundWrap.style.display="none";
        roundWrap.style.marginLeft="15px";

        roundTitle.onclick = ()=>{
            roundWrap.style.display =
            roundWrap.style.display==="none" ? "block" : "none";
        };

        roundDelete.onclick = async (e)=>{
            e.stopPropagation();
            await deleteRound(league.id, roundNumber);
        };

        roundDiv.appendChild(roundTitle);
        roundDiv.appendChild(roundDelete);

        seasonWrap.appendChild(roundDiv);
        seasonWrap.appendChild(roundWrap);

        rounds[roundNumber]
        .sort((a,b)=> new Date(a.date) - new Date(b.date))
        .forEach(match=>{

            let homeName = teamMap[match.homeTeam] || "?";
            let awayName = teamMap[match.awayTeam] || "?";

            let halfText = "";

            if(match.playerStats){

                let homeHT = 0;
                let awayHT = 0;

                (match.homeLineup || []).forEach(pid=>{
                    homeHT += match.playerStats[pid]?.goals1H || 0;
                });

                (match.awayLineup || []).forEach(pid=>{
                    awayHT += match.playerStats[pid]?.goals1H || 0;
                });

                if(match.homeScore != null){
                    halfText = ` <span style="opacity:0.6">(${homeHT}:${awayHT})</span>`;
                }
            }

            if(match.homeScore != null){
                if(match.homeScore > match.awayScore)
                    homeName = `<span style="color:#7dffa0">${homeName}</span>`;
                else if(match.awayScore > match.homeScore)
                    awayName = `<span style="color:#7dffa0">${awayName}</span>`;
            }

            const row = document.createElement("div");
            row.className="card";
            row.style.display="flex";
            row.style.justifyContent="space-between";
            row.style.alignItems="center";

            const info = document.createElement("div");
            info.style.cursor="pointer";
            info.style.flex="1";
            info.style.textAlign="center";

            let resultText = "";

if(match.shootout){
resultText = " SO";
}
else if(match.overtime){
resultText = " OT";
}

info.innerHTML = `
<strong>
${homeName} ${match.homeScore ?? "-"}:${match.awayScore ?? "-"}${resultText}${halfText} ${awayName}
</strong>
<div style="font-size:13px;color:#aaa">${match.date}</div>
`;

            info.onclick = ()=>{
                window.location.href =
                "matchDetail.html?league=" + league.id + "&id=" + match.id;
            };

            const del = document.createElement("div");
            del.innerText="✖";
            del.style.color="#ff6b6b";
            del.style.cursor="pointer";

            del.onclick = async (e)=>{
                e.stopPropagation();
                if(!checkDeletePassword()) return;
                if(!confirm("Smazat zápas?")) return;

                await deleteDoc(doc(db,"matches",league.id,"list",match.id));
                await deleteDoc(doc(db,"predictions", match.id));
                
                MATCHES_CACHE = null;
                render();
            };

            row.appendChild(info);
            row.appendChild(del);
            roundWrap.appendChild(row);

        });

    });

});

}

async function renderMatches(){

const list = document.getElementById("matchList");
list.innerHTML = "";

const data = await getData();

for(const sport of data.sports){

for(const league of (sport.leagues || [])){

const leagueDiv = document.createElement("div");
leagueDiv.className="card";
leagueDiv.innerHTML = "▶ " + league.name;
leagueDiv.style.cursor="pointer";

const leagueWrap = document.createElement("div");
leagueWrap.style.display="none";
leagueWrap.style.marginLeft="15px";

leagueDiv.onclick = async ()=>{

if(leagueWrap.style.display==="none"){

leagueWrap.style.display="block";

if(!leagueWrap.dataset.loaded){

const matches = await getMatches(league.id);
await renderLeagueRounds(league, matches, leagueWrap);
leagueWrap.dataset.loaded = "1";
}

}else{
leagueWrap.style.display="none";
}

};

list.appendChild(leagueDiv);
list.appendChild(leagueWrap);

}

}

}



async function deleteMatch(matchId){

if(!checkDeletePassword()) return;

if(!confirm("Smazat zápas?")) return;


const data = await getData();

data.sports.forEach(sport=>{
    sport.leagues?.forEach(league=>{
        league.seasons?.forEach(season=>{

            season.rounds?.forEach(round=>{
                round.matches =
                    round.matches.filter(m=>m.id!==matchId);
            });

            season.rounds =
                season.rounds.filter(r=>r.matches.length>0);
        });
    });
});

await saveData(data);
render();
}

async function deleteRound(leagueId, roundNumber){

if(!checkDeletePassword()) return;
if(!confirm("Smazat celé kolo?")) return;

// 🔥 smažeme zápasy z Firestore
const matches = await getMatches(leagueId);

for(const m of matches){

if(Number(m.roundNumber) === Number(roundNumber)){
await deleteDoc(doc(db,"matches",leagueId,"list",m.id));
await deleteDoc(doc(db,"predictions", m.id));
}
}

// 🔥 smažeme kolo ze struktury main
const data = await getData();

data.sports?.forEach(sport=>{
sport.leagues?.forEach(league=>{

if(league.id !== leagueId) return;

league.seasons?.forEach(season=>{
season.rounds =
(season.rounds || []).filter(r => Number(r.number) !== Number(roundNumber));
});

});
});

await saveData(data);

MATCHES_CACHE = null;

render();
}

async function deleteSeason(leagueId, seasonId){

if(!checkDeletePassword()) return;
if(!confirm("Smazat celou sezónu?")) return;

const matches = await getMatches(leagueId);

for(const m of matches){
if(m.season === seasonId){
await deleteDoc(doc(db,"matches",leagueId,"list",m.id));
await deleteDoc(doc(db,"predictions", m.id));
}
}

const data = await getData();

data.sports.forEach(sport=>{
sport.leagues?.forEach(league=>{
if(league.id !== leagueId) return;

league.seasons =
(league.seasons || []).filter(s => s.id !== seasonId);

});
});

await saveData(data);

MATCHES_CACHE = null;

render();
}

async function updateRoundName(leagueId, seasonId, roundNumber, newName){

const data = await getData();

data.sports?.forEach(sport=>{
sport.leagues?.forEach(league=>{

if(league.id !== leagueId) return;

league.seasons?.forEach(season=>{

if(season.id !== seasonId) return;

let round = season.rounds?.find(r =>
Number(r.number) === Number(roundNumber)
);

if(round){
round.name = newName;
}

});

});
});

await saveData(data);

MATCHES_CACHE = null;

render();
}

render()
