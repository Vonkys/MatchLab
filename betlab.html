<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BetLab</title>

<style>

body{
margin:0;
font-family:system-ui;
background:#0b0b0b;
color:white;
display:none;
}

.topbar{
padding:18px;
text-align:center;
background:#111;
border-bottom:1px solid #222;
}

.container{
max-width:420px;
margin:auto;
padding:20px;
}

.card{
background:#1b1b1b;
padding:16px;
border-radius:12px;
margin-bottom:14px;
border:1px solid #222222;
}

.match{
font-size:16px;
font-weight:bold;
margin-bottom:6px;
}

.tip{
font-size:22px;
font-weight:bold;
color:#6dd3ff;
margin-bottom:10px;
}

.row{
display:flex;
justify-content:space-between;
margin:4px 0;
}

.deleteBtn{
margin-top:12px;
width:100%;
padding:9px;
background:#3b0f0f;
border:1px solid #662222;
color:#ff8080;
border-radius:8px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="topbar">
<span onclick="window.location.href='index.html'" style="cursor:pointer">
← Zpět
</span>
</div>

<div class="container">

<button onclick="window.location.href='betlabstats.html'"
style="
width:100%;
padding:12px;
margin-bottom:15px;
background:#1e3a5f;
border:1px solid #355d8c;
color:#9fd0ff;
border-radius:10px;
cursor:pointer;
">
📊 Statistiky
</button>

<div id="betsList">
Načítám...
</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import { getFirestore, collection, getDocs, deleteDoc, doc, getDoc, query, where }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import { getAuth, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyA_bZAUiFIzQYrYTqdVkvF6GliLWbu7WN4",
authDomain: "matchlab-f7fb8.firebaseapp.com",
projectId: "matchlab-f7fb8",
storageBucket: "matchlab-f7fb8.firebasestorage.app",
messagingSenderId: "791469272358",
appId: "1:791469272358:web:3a3502f0b65d68bedb65e7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

onAuthStateChanged(auth,(user)=>{

if(!user){
window.location.href="login.html";
return;
}

document.body.style.display="block";
loadBets();

});



function evaluateBet(bet, match){

// zápas nenalezen
if(!match){
return {
status:"pending",
profit:0
};
}

// zápas ještě není odehraný
if(
match.homeScore == null ||
match.awayScore == null ||
match.status !== "played"
){
return {
status:"pending",
profit:0
};
}

const home = Number(match.homeScore);
const away = Number(match.awayScore);

let result;

if(home > away) result = "1";
else if(home < away) result = "2";
else result = "X";

// výhra
if(String(bet.type) === String(result)){
return {
status:"win",
profit:(bet.stake * bet.odds - bet.stake)
};
}

// prohra
return {
status:"loss",
profit:-bet.stake
};

}

async function loadBets(){

const list = document.getElementById("betsList");

const q = query(
collection(db,"bets"),
where("userId","==",auth.currentUser.uid)
);

const snap = await getDocs(q);



if(snap.empty){
list.innerHTML="Zatím žádné sázky";
return;
}



let html = "";

for(const d of snap.docs){

const bet = d.data();

let match = null;

if(bet.leagueId){

const matchSnap = await getDoc(
doc(db,"matches", bet.leagueId, "list", bet.matchId)
);

match = matchSnap.exists() ? matchSnap.data() : null;

}else{

// fallback – projdi všechny ligy
const leaguesSnap = await getDocs(collection(db,"matches"));

for(const leagueDoc of leaguesSnap.docs){

const matchesSnap = await getDocs(
collection(db,"matches", leagueDoc.id, "list")
);

for(const mdoc of matchesSnap.docs){
if(mdoc.id === bet.matchId){
match = mdoc.data();
break;
}
}

if(match) break;

}

}


const result = evaluateBet(bet, match);

let border = "#7dffa0";
let resultText = "";

if(result.status === "win"){
border = "#2ecc71";
resultText = "<div style='color:#2ecc71;margin-top:6px'>VÝHRA +" + result.profit.toFixed(0) + " Kč</div>";
}

if(result.status === "loss"){
border = "#e74c3c";
resultText = "<div style='color:#e74c3c;margin-top:6px'>PROHRA " + result.profit.toFixed(0) + " Kč</div>";
}

if(result.status === "pending"){
resultText = "<div style='opacity:0.6;margin-top:6px'>čeká na výsledek</div>";
}

html += `
<div class="card" style="border:1px solid ${border}">

<div class="match">
${bet.match}
</div>

<div class="tip">
TIP ${bet.type || "-"}
</div>

<div class="row">
<span>Kurz</span>
<span>${bet.odds}</span>
</div>

<div class="row">
<span>Vklad</span>
<span>${bet.stake} Kč</span>
</div>

${resultText}

<button class="deleteBtn" onclick="deleteBet('${d.id}')">
Smazat sázku
</button>

</div>
`;

}

list.innerHTML = html;

}

window.deleteBet = async function(id){

if(!confirm("Smazat sázku?")) return;

await deleteDoc(doc(db,"bets",id));

loadBets();

}

</script>

</body>
</html>
