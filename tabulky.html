<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabulka</title>

<style>
body{
    margin:0;
    font-family:system-ui;
    background:#0b0b0b;
    color:white;
    display:none;
}

.topbar{
    padding:18px;
    text-align:center;
    background:#111;
    border-bottom:1px solid #222;
}

.container{
    max-width:600px;
    margin:auto;
    padding:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th, td{
    padding:8px;
    text-align:center;
    border-bottom:1px solid #222;
}

th{
    background:#1b1b1b;
}

.team{
    text-align:left;
}
#statsButtons{
display:none;
}
@media (max-width:480px){

table{
font-size:13px;
}

td,th{
padding:6px 4px;
}

}
@media (max-width:480px){

th:nth-child(3),
th:nth-child(4),
th:nth-child(5),
th:nth-child(6),
th:nth-child(7),
th:nth-child(8),
td:nth-child(3),
td:nth-child(4),
td:nth-child(5),
td:nth-child(6),
td:nth-child(7),
td:nth-child(8){
width:24px;
text-align:center;
}

}
@media (max-width:480px){

td:nth-child(2){
white-space:nowrap;
}

}
@media (max-width:480px){

.form{
display:flex;
gap:2px;
white-space:nowrap;
}

td:last-child{
white-space:nowrap;
font-size:14px;
}

}

</style>
</head>
<body>

<div class="topbar">
<span onclick="window.location.href='index.html'" style="cursor:pointer">
← Zpět
</span>
</div>

<div class="container">
    <h2 id="leagueTitle">Tabulka</h2>

    <div id="statsButtons" style="margin-top:15px;">
        <button onclick="goPlayers()">
            Statistiky hráčů
        </button>

        <button onclick="goReferees()" style="margin-top:10px;">
            Statistiky rozhodčích
        </button>
    </div>

    <table id="table"></table>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, collection, getDocs }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA_bZAUiFIzQYrYTqdVkvF6GliLWbu7WN4",
  authDomain: "matchlab-f7fb8.firebaseapp.com",
  projectId: "matchlab-f7fb8",
  storageBucket: "matchlab-f7fb8.firebasestorage.app",
  messagingSenderId: "791469272358",
  appId: "1:791469272358:web:3a3502f0b65d68bedb65e7"
};

function getLeagueId(){
    return new URLSearchParams(window.location.search).get("league");
}

function getSportId(){
    return new URLSearchParams(window.location.search).get("sport");
}

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

onAuthStateChanged(auth,(user)=>{

if(!user){
window.location.href="login.html";
return;
}

document.body.style.display="block";

});

async function loadTable(){

    const snap = await getDoc(doc(db,"appData","main"));
    const data = snap.data();

    const leagueId = getLeagueId();
    const sportId = getSportId();
   
    const statsButtons = document.getElementById("statsButtons");

if(!leagueId){
    statsButtons.style.display = "none";
}else{
    statsButtons.style.display = "block";
}

    if(!sportId && !leagueId){
    renderSportSelect(data);
    return;
}

if(sportId && !leagueId){
    renderLeagueSelect(data, sportId);
    return;
}

let league = null;

data.sports.forEach(s=>{
    s.leagues?.forEach(l=>{
        if(l.id === leagueId){
            league = l;
        }
    });
});

if(!league){
    document.getElementById("leagueTitle").textContent = "Liga nenalezena";
    return;
}

    document.getElementById("leagueTitle").textContent = league.name;

    // ===== SELECT SEZÓNY =====

let selectedSeasonId = null;

if(!league.seasons || league.seasons.length === 0){
document.getElementById("table").innerHTML =
"<tr><td>Žádná sezóna</td></tr>";
return;
}

const snapAllMatches = await getDocs(
collection(db,"matches",leagueId,"list")
);

const allMatches = snapAllMatches.docs.map(d=>d.data());

// 🔥 nejdřív zjistit sezóny které mají zápasy
const seasonsWithMatches = league.seasons.filter(season =>
    allMatches.some(m => m.season === season.id)
);

// 🔥 když žádná sezóna → konec
if(seasonsWithMatches.length === 0){
document.getElementById("table").innerHTML =
"<tr><td>Žádná odehraná sezóna</td></tr>";
return;
}

// 🔥 teprve TEĎ vybrat default sezónu
selectedSeasonId =
[...seasonsWithMatches]
.sort((a,b)=>{
const getYear = s=>{
const m = s.name.match(/\d{4}/);
return m ? Number(m[0]) : 0;
};
return getYear(b) - getYear(a);
})[0].id;

// 🔥 vytvoření selectu
const seasonSelect = document.createElement("select");
seasonSelect.style.marginTop = "10px";
seasonSelect.style.padding = "8px";
seasonSelect.style.background = "#111";
seasonSelect.style.color = "white";
seasonSelect.style.border = "1px solid #333";
seasonSelect.style.borderRadius = "6px";

seasonsWithMatches
.slice()
.reverse()
.forEach(s=>{
const opt = document.createElement("option");
opt.value = s.id;
opt.textContent = s.name;
seasonSelect.appendChild(opt);
});

seasonSelect.value = selectedSeasonId;

document.querySelector(".container")
.insertBefore(seasonSelect,
document.getElementById("statsButtons"));

seasonSelect.onchange = ()=>{
selectedSeasonId = seasonSelect.value;
renderSeasonTable();
};
    
async function renderSeasonTable(){

    const snapMatches = await getDocs(
        collection(db,"matches",leagueId,"list")
    );

    let playedMatches =
    snapMatches.docs.map(d=>d.data())
    .filter(m =>
        m.status === "played" &&
        m.season === selectedSeasonId &&
        m.date
    )
    .sort((a,b)=> new Date(a.date) - new Date(b.date));

    let rows = [];

    // 🔥 načti týmy z nové struktury
    const teamSnap = await getDocs(collection(db,"teams"));

    const leagueTeams = teamSnap.docs
    .map(d=>d.data())
    .filter(t => t.leagueId === leagueId);

    leagueTeams.forEach(team=>{
        let stats = {
            played:0,
            wins:0,
            draws:0,
            losses:0,
            goalsFor:0,
            goalsAgainst:0,
            points:0
        };

        let teamMatches = playedMatches
        .filter(m =>
            m.homeTeam === team.id || m.awayTeam === team.id
        )
        .sort((a,b)=> new Date(a.date) - new Date(b.date));

        // forma jen posledních 5
        let formMatches = teamMatches.slice(-5).reverse();

        while(teamMatches.length < 5){
            teamMatches.unshift(null);
        }

        teamMatches.forEach(m=>{

            if(!m) return;

            let isHome = m.homeTeam === team.id;

            let gf = isHome ? m.homeScore : m.awayScore;
            let ga = isHome ? m.awayScore : m.homeScore;

            stats.played++;
            stats.goalsFor += gf;
            stats.goalsAgainst += ga;

            if(gf > ga){
                stats.wins++;
                stats.points += 3;
            }
            else if(gf < ga){
                stats.losses++;
            }
            else{
                stats.draws++;
                stats.points += 1;
            }

        });

        let form = formMatches.map(m=>{

            if(!m) return "EMPTY";

            if(m.homeTeam === team.id){

                if(m.homeScore > m.awayScore){
                    if(m.overtime || m.shootout) return "OTW";
                    return "W";
                }

                if(m.homeScore < m.awayScore){
                    if(m.overtime || m.shootout) return "OTL";
                    return "L";
                }

            }else{

                if(m.awayScore > m.homeScore){
                    if(m.overtime || m.shootout) return "OTW";
                    return "W";
                }

                if(m.awayScore < m.homeScore){
                    if(m.overtime || m.shootout) return "OTL";
                    return "L";
                }

            }

            return "D";

        });

        rows.push({
            name:team.name,
            played:stats.played,
            draws:stats.draws || 0,
            wins:stats.wins,
            losses:stats.losses,
            goalsFor:stats.goalsFor,
            goalsAgainst:stats.goalsAgainst,
            goalDiff:stats.goalsFor - stats.goalsAgainst,
            points:stats.points,
            form
        });

    });

    rows.sort((a,b)=>{
        if(b.points !== a.points) return b.points - a.points;
        if(b.goalDiff !== a.goalDiff) return b.goalDiff - a.goalDiff;
        return b.goalsFor - a.goalsFor;
    });

    renderTable(
        rows,
        data.sports.find(s => s.leagues?.some(l => l.id === leagueId)).name
    );

}   
renderSeasonTable();
}
function renderTable(rows, sport){

    const table = document.getElementById("table");

    if(sport === "Hokej"){

table.innerHTML = `
<tr>
<th>#</th>
<th class="team">Tým</th>
<th>Z</th>
<th>V</th>
<th>V/PP</th>
<th>P/PP</th>
<th>P</th>
<th>G</th>
<th>B</th>

<th>FORMA</th>
</tr>
`;

}else{

table.innerHTML = `
<tr>
<th>#</th>
<th class="team">Tým</th>
<th>Z</th>
<th>V</th>
<th>R</th>
<th>P</th>
<th>G</th>
<th>B</th>
<th>FORMA</th>
</tr>
`;

}

    

     rows.forEach((r,i)=>{

if(sport === "Hokej"){

table.innerHTML += `
<tr>
<td>${i+1}</td>
<td class="team">${r.name}</td>
<td>${r.played}</td>
<td>${r.wins}</td>
<td>${r.winsOT}</td>
<td>${r.lossesOT}</td>
<td>${r.losses}</td>
<td>${r.goalsFor}:${r.goalsAgainst}</td>
<td><b>${r.points}</b></td>
<td>
${r.form.map((f,i)=>{
let icon="⚪";

if(f==="W") icon="🟢";
if(f==="OTW") icon="🔵";
if(f==="OTL") icon="🟡";
if(f==="L") icon="🔴";

if(i === 0){
return `<span style="font-size:18px;border:1px solid #555;padding:2px 4px;border-radius:4px">${icon}</span>`;
}

return `<span style="opacity:0.6">${icon}</span>`;
}).join("")}
</td>
</tr>
`;

}else{

table.innerHTML += `
<tr>
<td>${i+1}</td>
<td class="team">${r.name}</td>
<td>${r.played}</td>
<td>${r.wins}</td>
<td>${r.draws}</td>
<td>${r.losses}</td>
<td>${r.goalsFor}:${r.goalsAgainst}</td>
<td><b>${r.points}</b></td>
<td>
${r.form.map((f,i)=>{

let icon="⚪";

if(f==="W") icon="🟢";
if(f==="D") icon="🟡";
if(f==="L") icon="🔴";

if(i === 0){
return `<span style="font-size:18px;border:1px solid #555;padding:2px 4px;border-radius:4px">${icon}</span>`;
}

return `<span style="opacity:0.6">${icon}</span>`;

}).join("")}
</td>
</tr>
`;

}

});
}
window.goPlayers = function(){
    const leagueId = getLeagueId();
    window.location.href = "hraci.html?league=" + leagueId;
}

window.goReferees = function(){
    const leagueId = getLeagueId();
    window.location.href = "rozhodci.html?league=" + leagueId;
}

function renderLeagueSelect(data, sportId){

    const sport = data.sports.find(s => s.id === sportId);

    document.getElementById("leagueTitle").textContent = "Vyber ligu";

    let html = "";

    sport.leagues?.forEach(league=>{

        html += `
        <div style="
            background:#1b1b1b;
            padding:12px;
            margin-top:8px;
            border-radius:8px;
            cursor:pointer
        "
        onclick="window.location.href='tabulky.html?league=${league.id}'"
        >
            ${league.name}
        </div>
        `;

    });

    document.getElementById("table").outerHTML = html;
}

function renderSportSelect(data){

    document.getElementById("leagueTitle").textContent = "Vyber sport";

    let html = "";

    data.sports.forEach(sport=>{

        html += `
        <div style="
            background:#1b1b1b;
            padding:12px;
            margin-top:8px;
            border-radius:8px;
            cursor:pointer
        "
        onclick="window.location.href='tabulky.html?sport=${sport.id}'"
        >
            ${sport.name}
        </div>
        `;

    });

    document.getElementById("table").outerHTML = html;
}

loadTable();

</script>
</body>
</html>
