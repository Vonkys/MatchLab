<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabulka</title>

<style>
body{
    margin:0;
    font-family:system-ui;
    background:#0b0b0b;
    color:white;
}

.topbar{
    padding:18px;
    text-align:center;
    background:#111;
    border-bottom:1px solid #222;
}

.container{
    max-width:600px;
    margin:auto;
    padding:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th, td{
    padding:8px;
    text-align:center;
    border-bottom:1px solid #222;
}

th{
    background:#1b1b1b;
}

.team{
    text-align:left;
}
#statsButtons{
display:none;
}

</style>
</head>
<body>

<div class="topbar">
<span onclick="window.location.href='index.html'" style="cursor:pointer">
← Zpět
</span>
</div>

<div class="container">
    <h2 id="leagueTitle">Tabulka</h2>

    <div id="statsButtons" style="margin-top:15px;">
        <button onclick="goPlayers()">
            Statistiky hráčů
        </button>

        <button onclick="goReferees()" style="margin-top:10px;">
            Statistiky rozhodčích
        </button>
    </div>

    <table id="table"></table>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA_bZAUiFIzQYrYTqdVkvF6GliLWbu7WN4",
  authDomain: "matchlab-f7fb8.firebaseapp.com",
  projectId: "matchlab-f7fb8",
  storageBucket: "matchlab-f7fb8.firebasestorage.app",
  messagingSenderId: "791469272358",
  appId: "1:791469272358:web:3a3502f0b65d68bedb65e7"
};

function getLeagueId(){
    return new URLSearchParams(window.location.search).get("league");
}

function getSportId(){
    return new URLSearchParams(window.location.search).get("sport");
}

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadTable(){

    const snap = await getDoc(doc(db,"appData","main"));
    const data = snap.data();

    const leagueId = getLeagueId();
    const sportId = getSportId();
   
    const statsButtons = document.getElementById("statsButtons");

if(!leagueId){
    statsButtons.style.display = "none";
}else{
    statsButtons.style.display = "block";
}

    if(!sportId && !leagueId){
    renderSportSelect(data);
    return;
}

if(sportId && !leagueId){
    renderLeagueSelect(data, sportId);
    return;
}

let league = null;

data.sports.forEach(s=>{
    s.leagues?.forEach(l=>{
        if(l.id === leagueId){
            league = l;
        }
    });
});

if(!league){
    document.getElementById("leagueTitle").textContent = "Liga nenalezena";
    return;
}

    document.getElementById("leagueTitle").textContent = league.name;

    const season = league.seasons?.[0];
    if(!season){
        document.getElementById("table").innerHTML = "<tr><td>Žádná sezóna</td></tr>";
        return;
    }

    const seasonId = season.id;

    // 🔥 všechny odehrané zápasy sezóny
    let playedMatches = [];

    season.rounds?.forEach(round=>{
        round.matches?.forEach(match=>{
            if(match.status === "played"){
                playedMatches.push(match);
            }
        });
    });

    let rows = [];

    league.teams.forEach(team=>{

        const stats = team.stats?.seasons?.[seasonId];
        if(!stats) return;

        // 🔥 forma posledních 5
        let teamMatches = playedMatches.filter(m =>
            m.homeTeam === team.id || m.awayTeam === team.id
        );

        teamMatches = teamMatches.slice(-5);

let winsOT = 0;
let lossesOT = 0;

teamMatches.forEach(m=>{

let isHome = m.homeTeam === team.id;

if(isHome){

if(m.homeScore > m.awayScore && (m.overtime || m.shootout)) winsOT++;
if(m.homeScore < m.awayScore && (m.overtime || m.shootout)) lossesOT++;

}else{

if(m.awayScore > m.homeScore && (m.overtime || m.shootout)) winsOT++;
if(m.awayScore < m.homeScore && (m.overtime || m.shootout)) lossesOT++;

}

});

let form = teamMatches.map(m => {
      let winsOT = 0;
let lossesOT = 0;

teamMatches.forEach(m=>{

let isHome = m.homeTeam === team.id;

if(isHome){

if(m.homeScore > m.awayScore && (m.overtime || m.shootout)) winsOT++;
if(m.homeScore < m.awayScore && (m.overtime || m.shootout)) lossesOT++;

}else{

if(m.awayScore > m.homeScore && (m.overtime || m.shootout)) winsOT++;
if(m.awayScore < m.homeScore && (m.overtime || m.shootout)) lossesOT++;

}

});

            if(m.homeTeam === team.id){

    if(m.homeScore > m.awayScore){

        if(m.overtime || m.shootout) return "OTW";
        return "W";

    }

    if(m.homeScore < m.awayScore){

        if(m.overtime || m.shootout) return "OTL";
        return "L";

    }

}else{

    if(m.awayScore > m.homeScore){

        if(m.overtime || m.shootout) return "OTW";
        return "W";

    }

    if(m.awayScore < m.homeScore){

        if(m.overtime || m.shootout) return "OTL";
        return "L";

    }

}

return "D";

});
        rows.push({
    name:team.name,
    played:stats.played,

    // fotbal
    draws:stats.draws || 0,

    // hokej
    wins:stats.wins - winsOT,
    winsOT:winsOT,
    lossesOT:lossesOT,
    losses:stats.losses - lossesOT,
            goalsFor:stats.goalsFor,
            goalsAgainst:stats.goalsAgainst,
            goalDiff:stats.goalsFor - stats.goalsAgainst,
            points:stats.points,
            form
        });

    });

    // 🔥 řazení
    rows.sort((a,b)=>{
        if(b.points !== a.points) return b.points - a.points;
        if(b.goalDiff !== a.goalDiff) return b.goalDiff - a.goalDiff;
        return b.goalsFor - a.goalsFor;
    });

    renderTable(rows, data.sports.find(s => s.leagues?.some(l => l.id === leagueId)).name);
}

function renderTable(rows, sport){

    const table = document.getElementById("table");

    if(sport === "Hokej"){

table.innerHTML = `
<tr>
<th>#</th>
<th class="team">Tým</th>
<th>Z</th>
<th>V</th>
<th>V/PP</th>
<th>P/PP</th>
<th>P</th>
<th>G</th>
<th>B</th>

<th>FORMA</th>
</tr>
`;

}else{

table.innerHTML = `
<tr>
<th>#</th>
<th class="team">Tým</th>
<th>Z</th>
<th>V</th>
<th>R</th>
<th>P</th>
<th>G</th>
<th>B</th>
<th>FORMA</th>
</tr>
`;

}

    

     rows.forEach((r,i)=>{

if(sport === "Hokej"){

table.innerHTML += `
<tr>
<td>${i+1}</td>
<td class="team">${r.name}</td>
<td>${r.played}</td>
<td>${r.wins}</td>
<td>${r.winsOT}</td>
<td>${r.lossesOT}</td>
<td>${r.losses}</td>
<td>${r.goalsFor}:${r.goalsAgainst}</td>
<td><b>${r.points}</b></td>
<td>
${r.form.map(f=>{
if(f==="W") return "🟢";
if(f==="OTW") return "🔵";
if(f==="OTL") return "🟡";
if(f==="L") return "🔴";
return "⚪";
}).join(" ")}
</td>
</tr>
`;

}else{

table.innerHTML += `
<tr>
<td>${i+1}</td>
<td class="team">${r.name}</td>
<td>${r.played}</td>
<td>${r.wins}</td>
<td>${r.draws}</td>
<td>${r.losses}</td>
<td>${r.goalsFor}:${r.goalsAgainst}</td>
<td><b>${r.points}</b></td>
<td>
${r.form.map(f=>{
if(f==="W") return "🟢";
if(f==="D") return "🟡";
return "🔴";
}).join(" ")}
</td>
</tr>
`;

}

});
}
window.goPlayers = function(){
    const leagueId = getLeagueId();
    window.location.href = "hraci.html?league=" + leagueId;
}

window.goReferees = function(){
    const leagueId = getLeagueId();
    window.location.href = "rozhodci.html?league=" + leagueId;
}

function renderLeagueSelect(data, sportId){

    const sport = data.sports.find(s => s.id === sportId);

    document.getElementById("leagueTitle").textContent = "Vyber ligu";

    let html = "";

    sport.leagues?.forEach(league=>{

        html += `
        <div style="
            background:#1b1b1b;
            padding:12px;
            margin-top:8px;
            border-radius:8px;
            cursor:pointer
        "
        onclick="window.location.href='tabulky.html?league=${league.id}'"
        >
            ${league.name}
        </div>
        `;

    });

    document.getElementById("table").outerHTML = html;
}

function renderSportSelect(data){

    document.getElementById("leagueTitle").textContent = "Vyber sport";

    let html = "";

    data.sports.forEach(sport=>{

        html += `
        <div style="
            background:#1b1b1b;
            padding:12px;
            margin-top:8px;
            border-radius:8px;
            cursor:pointer
        "
        onclick="window.location.href='tabulky.html?sport=${sport.id}'"
        >
            ${sport.name}
        </div>
        `;

    });

    document.getElementById("table").outerHTML = html;
}

loadTable();

</script>
</body>
</html>
