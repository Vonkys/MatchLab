<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Statistiky rozhodčích</title>

<style>
body{
    margin:0;
    font-family:system-ui;
    background:#0b0b0b;
    color:white;
}

.topbar{
    padding:18px;
    text-align:center;
    background:#111;
    border-bottom:1px solid #222;
}

.container{
    max-width:800px;
    margin:auto;
    padding:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th, td{
    padding:8px;
    text-align:center;
    border-bottom:1px solid #222;
}

th{
    background:#1b1b1b;
}

.name{
    text-align:left;
}
</style>
</head>
<body>

<div class="topbar">
<span onclick="window.location.href='tabulky.html'" style="cursor:pointer">
← Zpět na tabulku
</span>
</div>

<div class="container">
    <h2 id="leagueTitle">Statistiky rozhodčích</h2>
    <table id="table"></table>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA_bZAUiFIzQYrYTqdVkvF6GliLWbu7WN4",
  authDomain: "matchlab-f7fb8.firebaseapp.com",
  projectId: "matchlab-f7fb8",
  storageBucket: "matchlab-f7fb8.firebasestorage.app",
  messagingSenderId: "791469272358",
  appId: "1:791469272358:web:3a3502f0b65d68bedb65e7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadReferees(){

    const snap = await getDoc(doc(db,"appData","main"));
    const data = snap.data();

    const sport = data.sports[0];
    const league = sport.leagues[0];

    document.getElementById("leagueTitle").textContent =
        `Statistiky rozhodčích – ${league.name}`;

    const season = league.seasons?.[0];
    if(!season){
        document.getElementById("table").innerHTML =
            "<tr><td>Žádná sezóna</td></tr>";
        return;
    }

    const seasonId = season.id;

    // 🔥 všechny odehrané zápasy
    let playedMatches = [];

    season.rounds?.forEach(round=>{
        round.matches?.forEach(match=>{
            if(match.status === "played"){
                playedMatches.push(match);
            }
        });
    });

    let refStats = {};

    playedMatches.forEach(match=>{

        if(!match.refereeId) return;

        if(!refStats[match.refereeId]){
            refStats[match.refereeId] = {
                matches:0,
                yellow:0,
                red:0
            };
        }

        refStats[match.refereeId].matches++;

        // 🔥 spočítáme karty ze všech hráčů
        if(match.playerStats){
            Object.values(match.playerStats).forEach(ps=>{
                refStats[match.refereeId].yellow += ps.yellow || 0;
                refStats[match.refereeId].red += ps.red || 0;
            });
        }

    });

    let rows = [];

    league.referees?.forEach(ref=>{

        const stats = refStats[ref.id];
        if(!stats) return;

        rows.push({
            name:ref.name,
            matches:stats.matches,
            yellow:stats.yellow,
            red:stats.red,
            yellowAvg:(stats.yellow / stats.matches).toFixed(2),
            redAvg:(stats.red / stats.matches).toFixed(2)
        });

    });

    // řazení podle průměru žlutých
    rows.sort((a,b)=> b.yellowAvg - a.yellowAvg);

    renderTable(rows);
}

function renderTable(rows){

    const table = document.getElementById("table");

    table.innerHTML = `
        <tr>
            <th>#</th>
            <th class="name">Rozhodčí</th>
            <th>Zápasy</th>
            <th>🟨</th>
            <th>🟥</th>
            <th>🟨 / zápas</th>
            <th>🟥 / zápas</th>
        </tr>
    `;

    rows.forEach((r,i)=>{

        table.innerHTML += `
            <tr>
                <td>${i+1}</td>
                <td class="name">${r.name}</td>
                <td>${r.matches}</td>
                <td>${r.yellow}</td>
                <td>${r.red}</td>
                <td>${r.yellowAvg}</td>
                <td>${r.redAvg}</td>
            </tr>
        `;
    });
}

loadReferees();

</script>

</body>
</html>
