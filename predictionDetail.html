function findMatch(data, matchId){

    let match=null;
    let league=null;

    data.sports.forEach(s=>{
        s.leagues?.forEach(l=>{
            l.seasons?.forEach(season=>{
                season.rounds?.forEach(round=>{
                    round.matches?.forEach(m=>{
                        if(m.id===matchId){
                            match=m;
                            league=l;
                        }
                    });
                });
            });
        });
    });

    return {match,league};
}

// ===== LEAGUE AVERAGES =====

function getLeagueAverages(){

    let totalGoals = 0;
    let totalMatches = 0;
    let totalXG = 0;
    let totalCards = 0;

    leagueMatches.forEach(match=>{

        if(match.homeScore == null || match.awayScore == null) return;

        totalMatches++;

        totalGoals += Number(match.homeScore) || 0;
        totalGoals += Number(match.awayScore) || 0;

        if(match.playerStats){
            Object.values(match.playerStats).forEach(ps=>{
                totalXG += ps.xg || 0;
                totalCards += (ps.yellow || 0) + (ps.red || 0);
            });
        }

    });

    if(totalMatches === 0){
        return {
            avgGoals: 2.5,
            avgXG: 2.5,
            avgCards: 4
        };
    }

    return {
        avgGoals: totalGoals / totalMatches,
        avgXG: totalXG / totalMatches,
        avgCards: totalCards / totalMatches
    };
}
// ===== REFEREE STATS =====

function getRefereeStats(){

    let stats = {};

    leagueMatches.forEach(match=>{

        if(match.status !== "played") return;
        if(!match.refereeId) return;

        if(!stats[match.refereeId]){
            stats[match.refereeId] = {
                matches:0,
                yellow:0,
                red:0
            };
        }

        stats[match.refereeId].matches++;

        if(match.playerStats){
            Object.values(match.playerStats).forEach(ps=>{
                stats[match.refereeId].yellow += ps.yellow || 0;
                stats[match.refereeId].red += ps.red || 0;
            });
        }

    });

    return stats;
}

function getTeamFaceoffForm(league, season, teamId){

let matches = [];
let wins = 0;
let total = 0;

season.rounds?.forEach(round=>{
round.matches?.forEach(match=>{

if(match.homeScore == null || match.awayScore == null) return;

if(match.homeTeam === teamId || match.awayTeam === teamId){
matches.push(match);
}

});
});

matches = matches
.sort((a,b)=> new Date(a.date)-new Date(b.date))
.slice(-6);

matches.forEach(match=>{

if(match.teamStats){

if(match.homeTeam === teamId){
wins += match.teamStats.homeFaceoffsWon || 0;
total += match.teamStats.homeFaceoffsTotal || 0;
}

if(match.awayTeam === teamId){
wins += match.teamStats.awayFaceoffsWon || 0;
total += match.teamStats.awayFaceoffsTotal || 0;
}

}

});

if(total === 0) return 0.5;

return wins / total;
}

function getTeamShotsForm(league, season, teamId){

let matches = [];
let shots = 0;

season.rounds?.forEach(round=>{
round.matches?.forEach(match=>{

if(match.homeScore == null || match.awayScore == null) return;

if(match.homeTeam === teamId || match.awayTeam === teamId){
matches.push(match);
}

});
});

matches = matches
.sort((a,b)=> new Date(a.date)-new Date(b.date))
.slice(-6);

matches.forEach(match=>{

if(!match.playerStats) return;

Object.entries(match.playerStats).forEach(([playerId, ps])=>{

if(match.homeTeam === teamId &&
match.homeLineup?.includes(playerId)){
shots += ps.shots || 0;
}

if(match.awayTeam === teamId &&
match.awayLineup?.includes(playerId)){
shots += ps.shots || 0;
}

});

});

if(matches.length === 0) return 28;

return shots / matches.length;
}

function getTeamShotsAgainstForm(league, season, teamId){

let matches = [];
let shotsAgainst = 0;

season.rounds?.forEach(round=>{
round.matches?.forEach(match=>{

if(match.homeScore == null || match.awayScore == null) return;

if(match.homeTeam === teamId || match.awayTeam === teamId){
matches.push(match);
}

});
});

matches = matches
.sort((a,b)=> new Date(a.date)-new Date(b.date))
.slice(-6);

matches.forEach(match=>{

if(!match.playerStats) return;

let opponentLineup =
match.homeTeam === teamId
? match.awayLineup
: match.homeLineup;

opponentLineup?.forEach(playerId=>{
shotsAgainst += match.playerStats[playerId]?.shots || 0;
});

});

if(matches.length === 0) return 30;

return shotsAgainst / matches.length;
}


// ===== TEAM CARDS =====

function getTeamCards(league, season, teamId){

let matches = leagueMatches
.filter(m =>
(m.homeTeam === teamId || m.awayTeam === teamId) &&
m.playerStats
)
.sort((a,b)=> new Date(a.date)-new Date(b.date))
.slice(-10);

let cards = 0;

matches.forEach(match=>{

Object.entries(match.playerStats || {}).forEach(([pid,ps])=>{

if(match.homeTeam === teamId &&
match.homeLineup?.includes(pid)){
cards += (ps.yellow || 0) + (ps.red || 0);
}

if(match.awayTeam === teamId &&
match.awayLineup?.includes(pid)){
cards += (ps.yellow || 0) + (ps.red || 0);
}

});

});

if(matches.length === 0) return 0;

return cards / matches.length;
}
function getTeamSeasonStats(league, season, teamId, leagueAvg){

let matches = leagueMatches
.filter(m =>
(m.homeTeam === teamId || m.awayTeam === teamId) &&
m.homeScore != null &&
m.awayScore != null
)
.sort((a,b)=> new Date(a.date) - new Date(b.date))
.slice(-10);

let homePlayed = 0;
let awayPlayed = 0;

let homeGoals = 0;
let homeGoalsAgainst = 0;

let awayGoals = 0;
let awayGoalsAgainst = 0;

let homeXG = 0;
let awayXG = 0;

matches.forEach(match=>{

if(match.homeTeam === teamId){

homePlayed++;
homeGoals += Number(match.homeScore) || 0;
homeGoalsAgainst += Number(match.awayScore) || 0;

(match.homeLineup || []).forEach(pid=>{
homeXG += match.playerStats?.[pid]?.xg || 0;
});

}

if(match.awayTeam === teamId){

awayPlayed++;
awayGoals += Number(match.awayScore) || 0;
awayGoalsAgainst += Number(match.homeScore) || 0;

(match.awayLineup || []).forEach(pid=>{
awayXG += match.playerStats?.[pid]?.xg || 0;
});

}

});

const totalPlayed = homePlayed + awayPlayed;
const totalGoals = homeGoals + awayGoals;
const totalGoalsAgainst = homeGoalsAgainst + awayGoalsAgainst;
const totalXG = homeXG + awayXG;

return {

homePlayed,
awayPlayed,

homeGoalsPerMatch:
(homeGoals + leagueAvg.avgGoals * 3) /
(homePlayed + 3),

homeGoalsAgainstPerMatch:
homePlayed
? homeGoalsAgainst / homePlayed
: (totalPlayed ? totalGoalsAgainst / totalPlayed : 0),

awayGoalsPerMatch:
(awayGoals + leagueAvg.avgGoals * 3) /
(awayPlayed + 3),

awayGoalsAgainstPerMatch:
awayPlayed
? awayGoalsAgainst / awayPlayed
: (totalPlayed ? totalGoalsAgainst / totalPlayed : 0),

homeXGPerMatch:
homePlayed
? homeXG / homePlayed
: (totalPlayed ? totalXG / totalPlayed : 0),

awayXGPerMatch:
awayPlayed
? awayXG / awayPlayed
: (totalPlayed ? totalXG / totalPlayed : 0),

pointsPerMatch:
totalPlayed > 0
? (
matches.reduce((pts,m)=>{

if(m.homeTeam === teamId){

if(m.homeScore > m.awayScore) return pts+3;
if(m.homeScore === m.awayScore) return pts+1;

}else{

if(m.awayScore > m.homeScore) return pts+3;
if(m.awayScore === m.homeScore) return pts+1;

}

return pts;

},0) / totalPlayed
)
: 1.2

};

}

function fixLineup(lineup, teamId){

// 1. hráči týmu co můžou hrát
const availablePlayers = leaguePlayers.filter(p =>
p.teamId === teamId &&
(p.status === "available" || !p.status)
);

const p = leaguePlayers.find(x=>x.id === pid);
return p && (p.status === "available" || !p.status);
});

// 3. doplň do 11 hráčů
const usedIds = new Set(fixed);

availablePlayers.forEach(p=>{
if(fixed.length >= 11) return;

if(!usedIds.has(p.id)){
fixed.push(p.id);
usedIds.add(p.id);
}
});

return fixed;
}

function getFootballLineupStrength(players){

let total = 0;
let weightSum = 0;

players.forEach(p=>{

const r = p.stats?.total?.avgRating || 6.5;

// váha hráče (hvězdy víc)
let weight = 1 + Math.max(0, (r - 6.5) * 1.2);

// lehkej boost za konzistenci
const matches = p.stats?.total?.matches || 0;
if(matches > 10) weight *= 1.05;

total += r * weight;
weightSum += weight;

});

if(weightSum === 0) return 6.6;

return total / weightSum;
}

function getHockeyLineupStrength(players){

let index = 0;
let count = 0;

players.forEach(p=>{

const t = p.stats?.total;
if(!t || t.matches===0) return;

const goals = (t.goals || 0) / t.matches;
const shots = (t.shots || 0) / t.matches;
const plus = (t.plusMinus || 0) / t.matches;

let value =
(goals * 1.6) +
(shots * 0.18) +
(plus * 0.25);

if(p.position === "GK"){
const savePct =
(t.saves && t.shotsAgainst)
? t.saves / t.shotsAgainst
: 0.905;

value = savePct * 2.5;
}

index += value;
count++;

});

if(count===0) return 1;

return 0.85 + (index / count) * 0.15;
}

function getH2HForm(league, season, homeId, awayId){

let matches = leagueMatches
.filter(m =>
m.homeScore != null &&
m.awayScore != null &&
(
(m.homeTeam === homeId && m.awayTeam === awayId) ||
(m.homeTeam === awayId && m.awayTeam === homeId)
)
)
.sort((a,b)=> new Date(a.date) - new Date(b.date))
.slice(-5);

let homePoints = 0;
let awayPoints = 0;

matches.forEach(m=>{

if(m.homeTeam === homeId){

if(m.homeScore > m.awayScore) homePoints += 3;
else if(m.homeScore === m.awayScore){
homePoints += 1;
awayPoints += 1;
}else awayPoints += 3;

}else{

if(m.awayScore > m.homeScore) homePoints += 3;
else if(m.awayScore === m.homeScore){
homePoints += 1;
awayPoints += 1;
}else awayPoints += 3;

}

});

if(matches.length === 0) return 0;

return (homePoints - awayPoints) / (matches.length * 3);

}

// ===== TEAM RECENT ATTACK XG FORM

function getTeamRecentXGForm(league, season, teamId){

let matches = leagueMatches
.filter(m =>
(m.homeTeam === teamId || m.awayTeam === teamId) &&
m.playerStats
)
.sort((a,b)=> new Date(a.date) - new Date(b.date))
.slice(-5);

let totalXG = 0;

matches.forEach(match=>{

Object.entries(match.playerStats || {}).forEach(([playerId, ps])=>{

if(match.homeTeam === teamId &&
match.homeLineup?.includes(playerId)){
totalXG += ps.xg || 0;
}

if(match.awayTeam === teamId &&
match.awayLineup?.includes(playerId)){
totalXG += ps.xg || 0;
}

});

});

if(matches.length === 0) return 1;

const avgXG = totalXG / matches.length;

return 0.85 + (avgXG / 1.4) * 0.3;

}

// ===== TEAM RECENT DEFENSIVE XG FORM

function getTeamDefensiveXGForm(league, season, teamId){

let matches = leagueMatches
.filter(m =>
(m.homeTeam === teamId || m.awayTeam === teamId) &&
m.playerStats
)
.sort((a,b)=> new Date(a.date) - new Date(b.date))
.slice(-5);

let totalXGAllowed = 0;

matches.forEach(match=>{

Object.entries(match.playerStats || {}).forEach(([playerId, ps])=>{

if(match.homeTeam === teamId &&
match.awayLineup?.includes(playerId)){
totalXGAllowed += ps.xg || 0;
}

if(match.awayTeam === teamId &&
match.homeLineup?.includes(playerId)){
totalXGAllowed += ps.xg || 0;
}

});

});

if(matches.length === 0) return 1;

const avgAllowed = totalXGAllowed / matches.length;

return 1.15 - (avgAllowed / 1.4) * 0.3;

}

function getTeamForm(league, season, teamId){

let matches = leagueMatches
.filter(m =>
m.homeTeam === teamId ||
m.awayTeam === teamId
)
.sort((a,b)=> new Date(a.date) - new Date(b.date))
.slice(-5);

const weights = [0.03,0.07,0.2,0.3,0.4];

let weightedPoints = 0;
let totalWeight = 0;

matches.forEach((m,i)=>{

let pts = 0;

if(m.homeTeam === teamId){
if(m.homeScore > m.awayScore) pts = 3;
else if(m.homeScore === m.awayScore) pts = 1;
}else{
if(m.awayScore > m.homeScore) pts = 3;
else if(m.awayScore === m.homeScore) pts = 1;
}

const w = weights[weights.length - matches.length + i];

weightedPoints += (pts/3) * w;
totalWeight += w;

});

if(totalWeight === 0) return 0.5;

return weightedPoints / totalWeight;

}
