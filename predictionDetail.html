<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detail predikce</title>

<style>
body{
    margin:0;
    font-family:system-ui;
    background:#0b0b0b;
    color:white;
}

.topbar{
    padding:18px;
    text-align:center;
    background:#111;
    border-bottom:1px solid #222;
}

.container{
    max-width:420px;
    margin:auto;
    padding:20px;
}

.card{
    background:#1b1b1b;
    padding:15px;
    border-radius:12px;
    margin-top:15px;
    border:1px solid #222;
}

.sectionTitle{
    font-size:14px;
    opacity:0.6;
    margin-bottom:10px;
}

.bigValue{
    font-size:18px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="topbar">
<span onclick="window.location.href='predikce.html'" style="cursor:pointer">
← Zpět
</span>
</div>

<div class="container" id="app">
Načítám...
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA_bZAUiFIzQYrYTqdVkvF6GliLWbu7WN4",
  authDomain: "matchlab-f7fb8.firebaseapp.com",
  projectId: "matchlab-f7fb8",
  storageBucket: "matchlab-f7fb8.firebasestorage.app",
  messagingSenderId: "791469272358",
  appId: "1:791469272358:web:3a3502f0b65d68bedb65e7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function getMatchId(){
    return new URLSearchParams(window.location.search).get("id");
}

function findMatch(data, matchId){

    let match=null;
    let league=null;

    data.sports.forEach(s=>{
        s.leagues?.forEach(l=>{
            l.seasons?.forEach(season=>{
                season.rounds?.forEach(round=>{
                    round.matches?.forEach(m=>{
                        if(m.id===matchId){
                            match=m;
                            league=l;
                        }
                    });
                });
            });
        });
    });

    return {match,league};
}

// ===== LEAGUE AVERAGES =====

function getLeagueAverages(league, season){

    let totalGoals = 0;
    let totalMatches = 0;
    let totalXG = 0;
    let totalCards = 0;

    season.rounds?.forEach(round=>{
        round.matches?.forEach(match=>{

            if(match.homeScore == null || match.awayScore == null) return;

            totalMatches++;

            totalGoals += (match.homeScore || 0);
            totalGoals += (match.awayScore || 0);

            if(match.playerStats){
                Object.values(match.playerStats).forEach(ps=>{
                    totalXG += ps.xg || 0;
                    totalCards += (ps.yellow || 0) + (ps.red || 0);
                });
            }

        });
    });

    if(totalMatches === 0){
        return {
            avgGoals: 2.5,
            avgXG: 2.5,
            avgCards: 4
        };
    }

    return {
        avgGoals: totalGoals / totalMatches,
        avgXG: totalXG / totalMatches,
        avgCards: totalCards / totalMatches
    };
}


// ===== TEAM HOME/AWAY STATS =====

function getTeamSeasonStats(league, season, teamId, leagueAvg){

    let homePlayed = 0;
    let awayPlayed = 0;

    let homeGoals = 0;
    let homeGoalsAgainst = 0;

    let awayGoals = 0;
    let awayGoalsAgainst = 0;

    let homeXG = 0;
    let awayXG = 0;

    season.rounds?.forEach(round=>{
        round.matches?.forEach(match=>{

            if(match.homeScore == null || match.awayScore == null) return;

            if(String(match.homeTeam).trim() === String(teamId).trim()){
    
                homePlayed++;
                homeGoals += Number(match.homeScore) || 0;
                homeGoalsAgainst += Number(match.awayScore) || 0;

                if(match.playerStats){
                    Object.values(match.playerStats).forEach(ps=>{
                        homeXG += ps.xg || 0;
                    });
                }
            }

            if(String(match.awayTeam).trim() === String(teamId).trim()){

                awayPlayed++;
                awayGoals += Number(match.awayScore) || 0;
                awayGoalsAgainst += Number(match.homeScore) || 0;
                
                if(match.playerStats){
                    Object.values(match.playerStats).forEach(ps=>{
                        awayXG += ps.xg || 0;
                    });
                }
            }

        });
    });

    const totalPlayed = homePlayed + awayPlayed;
    const totalGoals = homeGoals + awayGoals;
    const totalGoalsAgainst = homeGoalsAgainst + awayGoalsAgainst;
    const totalXG = homeXG + awayXG;

    return {
        homePlayed,
        awayPlayed,

    homeGoalsPerMatch:
    (homeGoals + leagueAvg.avgGoals) /
    (homePlayed + 1),
        
              homeGoalsAgainstPerMatch: homePlayed
            ? homeGoalsAgainst / homePlayed
            : (totalPlayed ? totalGoalsAgainst / totalPlayed : 0),

      awayGoalsPerMatch:
    (awayGoals + leagueAvg.avgGoals) /
    (awayPlayed + 1),

        awayGoalsAgainstPerMatch: awayPlayed
            ? awayGoalsAgainst / awayPlayed
            : (totalPlayed ? totalGoalsAgainst / totalPlayed : 0),

        homeXGPerMatch: homePlayed
            ? homeXG / homePlayed
            : (totalPlayed ? totalXG / totalPlayed : 0),

        awayXGPerMatch: awayPlayed
            ? awayXG / awayPlayed
            : (totalPlayed ? totalXG / totalPlayed : 0)
    };
}

   

async function render(){

    const snap = await getDoc(doc(db,"appData","main"));
    const data = snap.data();

    const matchId = getMatchId();
    const result = findMatch(data, matchId);

    if(!result.match){
        document.getElementById("app").innerHTML="Zápas nenalezen";
        return;
    }

    const match = result.match;
    const league = result.league;
   
    // ===== NAJDI AKTUÁLNÍ SEZÓNU =====
const season = league.seasons?.[league.seasons.length - 1];

const leagueAvg = getLeagueAverages(league, season);

const homeStats = getTeamSeasonStats(league, season, match.homeTeam, leagueAvg);
const awayStats = getTeamSeasonStats(league, season, match.awayTeam, leagueAvg);

// ===== EXPECTED GOALS =====

const leagueGoals = (leagueAvg.avgGoals || 2.6) / 2;

const homeAttack = homeStats.homeGoalsPerMatch / leagueGoals;
const homeDefense = (homeStats.homeGoalsAgainstPerMatch || leagueGoals) / leagueGoals;

const awayAttack = awayStats.awayGoalsPerMatch / leagueGoals;
const awayDefense = (awayStats.awayGoalsAgainstPerMatch || leagueGoals) / leagueGoals;

const homeExpectedGoals = homeAttack * awayDefense * leagueGoals;
const awayExpectedGoals =
    (awayAttack || 1) * (homeDefense || 1) * leagueGoals;

// ===== RESULT PREDICTION =====

let resultPrediction;

if(homeExpectedGoals > awayExpectedGoals + 0.3){
    resultPrediction = "1 (domácí)";
}
else if(awayExpectedGoals > homeExpectedGoals + 0.3){
    resultPrediction = "2 (hosté)";
}
else{
    resultPrediction = "X (remíza)";
}

// ===== GOALS PREDICTION =====

const totalExpectedGoals = homeExpectedGoals + awayExpectedGoals;

let goalsPrediction;

if(totalExpectedGoals > 3){
    goalsPrediction = "Over 2.5";
}
else{
    goalsPrediction = "Under 2.5";
}

  
    
const home = league.teams.find(t=>t.id===match.homeTeam);
    const away = league.teams.find(t=>t.id===match.awayTeam);

    const appDiv = document.getElementById("app");

    appDiv.innerHTML = `
        <h2 style="text-align:center;">
            ${home?.name} 🆚 ${away?.name}
        </h2>
        <div style="text-align:center;opacity:0.6;margin-bottom:10px;">
            ${match.date}
        </div>

        <div class="card">
            <div class="sectionTitle">1X2</div>
            <div id="resultPrediction">Výpočet...</div>
        </div>

        <div class="card">
            <div class="sectionTitle">Góly</div>
            <div id="goalsPrediction">Výpočet...</div>
        </div>

        <div class="card">
            <div class="sectionTitle">Karty</div>
            <div id="cardsPrediction">Výpočet...</div>
        </div>
    `;
    document.getElementById("resultPrediction").innerHTML = `
<b>${resultPrediction}</b><br>
Očekávané góly: ${homeExpectedGoals.toFixed(2)} : ${awayExpectedGoals.toFixed(2)}
`;

document.getElementById("goalsPrediction").innerHTML = `
${goalsPrediction}<br>
Expected goals total: ${totalExpectedGoals.toFixed(2)}
`;

document.getElementById("cardsPrediction").innerHTML = `
Průměr karet v lize: ${leagueAvg.avgCards.toFixed(2)}
`;

}

render();

</script>

</body>
</html>
