<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Statistiky hráčů</title>

<style>
body{
    margin:0;
    font-family:system-ui;
    background:#0b0b0b;
    color:white;
}

.topbar{
    padding:18px;
    text-align:center;
    background:#111;
    border-bottom:1px solid #222;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th, td{
    padding:8px;
    text-align:center;
    border-bottom:1px solid #222;
}

th{
    background:#1b1b1b;
    cursor:pointer;
    transition:0.15s;
}

th:hover{
    background:#2a2a2a;
}

.player{
    text-align:left;
}

.team{
    font-size:12px;
    opacity:0.7;
}

.position{
    display:inline-block;
    font-size:10px;
    padding:2px 6px;
    border-radius:4px;
    margin-right:6px;
    font-weight:bold;
    color:black;
}

</style>
</head>
<body>

<div class="topbar">
<span onclick="window.location.href='tabulky.html'" style="cursor:pointer">
← Zpět na tabulku
</span>
</div>

<div class="container">
    <h2 id="leagueTitle">Statistiky hráčů</h2>
    <table id="table"></table>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA_bZAUiFIzQYrYTqdVkvF6GliLWbu7WN4",
  authDomain: "matchlab-f7fb8.firebaseapp.com",
  projectId: "matchlab-f7fb8",
  storageBucket: "matchlab-f7fb8.firebasestorage.app",
  messagingSenderId: "791469272358",
  appId: "1:791469272358:web:3a3502f0b65d68bedb65e7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadPlayers(){

    const snap = await getDoc(doc(db,"appData","main"));
    const data = snap.data();

    const sport = data.sports[0];
    const league = sport.leagues[0];

    document.getElementById("leagueTitle").textContent =
        `Statistiky hráčů – ${league.name}`;

    const season = league.seasons?.[0];
    if(!season){
        document.getElementById("table").innerHTML =
            "<tr><td>Žádná sezóna</td></tr>";
        return;
    }

    const seasonId = season.id;

    let rows = [];
window.rows = rows;

    league.teams.forEach(team=>{

        team.players.forEach(player=>{

            const stats = player.stats?.seasons?.[seasonId];
            if(!stats) return;

            if(stats.matches === 0) return;

   rows.push({
    name:player.name,
    team:team.name,
    position:player.position || "ATT",
    matches:stats.matches,
    minutes:stats.minutes || 0,
    goals:stats.goals || 0,
    assists:stats.assists || 0,
    yellow:stats.yellow || 0,
    red:stats.red || 0,

    passes: stats.passesTotal || 0,
passesCompleted: stats.passesMade || 0,
passAccuracy: (stats.passesTotal || 0) > 0
    ? ((stats.passesMade / stats.passesTotal) * 100).toFixed(0)
    : 0,
    
    xgPer90: stats.minutes > 0
    ? ((stats.xg || 0) / stats.minutes * 90).toFixed(2)
    : 0,

    avgRating: player.stats?.total?.avgRating || 0,

    goalsPer90: stats.minutes > 0
    ? ((stats.goals / stats.minutes) * 90).toFixed(2)
    : 0
});

        });

    });

    // 🔥 řazení
    window.rows.sort((a,b)=>{
    if(b.avgRating !== a.avgRating)
        return b.avgRating - a.avgRating;

    if(b.goals !== a.goals)
        return b.goals - a.goals;

    return b.assists - a.assists;
});

    renderTable(window.rows);
}

const positionColors = {
    GK:"#3498db",
    DEF:"#2ecc71",
    MID:"#f1c40f",
    ATT:"#e74c3c"
};


function renderTable(rows){

    const table = document.getElementById("table");

    table.innerHTML = `
    <tr>
        <th>#</th>
        <th class="player">Hráč</th>
        <th onclick="sortBy('team')" style="cursor:pointer">Tým</th>
        <th onclick="sortBy('avgRating')" style="cursor:pointer">⭐</th>
        <th onclick="sortBy('matches')" style="cursor:pointer">Z</th>
        <th onclick="sortBy('minutes')" style="cursor:pointer">Min</th>
        <th onclick="sortBy('goals')" style="cursor:pointer">G</th>
        <th onclick="sortBy('assists')" style="cursor:pointer">A</th>
        <th onclick="sortBy('yellow')" style="cursor:pointer">🟨</th>
        <th onclick="sortBy('red')" style="cursor:pointer">🟥</th>
        <th onclick="sortBy('goalsPer90')" style="cursor:pointer">G/90</th>
        <th onclick="sortBy('passes')" style="cursor:pointer">Přihr.</th>
        <th onclick="sortBy('passesCompleted')" style="cursor:pointer">Přihr.OK</th>
        <th onclick="sortBy('passAccuracy')" style="cursor:pointer">%</th>
        <th onclick="sortBy('xgPer90')" style="cursor:pointer">xG/90</th>
    </tr>
`;

   

        rows.forEach((r,i)=>{

    table.innerHTML += `
<tr>

<td>${i+1}</td>

<td class="player">

<span class="position"
style="background:${positionColors[r.position]}">
${r.position}
</span>

${r.name}

</td>

<td class="team">${r.team}</td>
<td><b>${r.avgRating.toFixed(2)}</b></td>
<td>${r.matches}</td>
<td>${r.minutes}</td>
<td><b>${r.goals}</b></td>
<td>${r.assists}</td>
<td>${r.yellow}</td>
<td>${r.red}</td>
<td>${r.goalsPer90}</td>
<td>${r.passes}</td>
<td>${r.passesCompleted}</td>
<td>${r.passAccuracy}%</td>
<td>${r.xgPer90}</td>

</tr>
`;
});
}

window.sortBy = function(field){

    window.rows.sort((a,b)=>{

        const A = a[field];
        const B = b[field];

        // pokud je text (např tým)
        if(typeof A === "string" && isNaN(A)){
            return A.localeCompare(B);
        }

        // jinak čísla
        return Number(B) - Number(A);
    });

    renderTable(window.rows);
}

loadPlayers();

</script>

</body>
</html>
