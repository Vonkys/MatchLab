<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Statistiky hráčů</title>

<style>
body{
    margin:0;
    font-family:system-ui;
    background:#0b0b0b;
    color:white;
    display:none;
}

.topbar{
    padding:18px;
    text-align:center;
    background:#111;
    border-bottom:1px solid #222;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th, td{
    padding:8px;
    text-align:center;
    border-bottom:1px solid #222;
}

th{
    background:#1b1b1b;
    cursor:pointer;
    transition:0.15s;
}

th:hover{
    background:#2a2a2a;
}

.player{
    text-align:left;
}

.team{
    font-size:12px;
    opacity:0.7;
}

.position{
    display:inline-block;
    font-size:10px;
    padding:2px 6px;
    border-radius:4px;
    margin-right:6px;
    font-weight:bold;
    color:black;
}

</style>
</head>
<body>

<div class="topbar">
<span onclick="goBack()" style="cursor:pointer">
← Zpět na tabulku
</span>
</div>

<div class="container">
    <h2 id="leagueTitle">Statistiky hráčů</h2>
    <table id="table"></table>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, collection, getDocs }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA_bZAUiFIzQYrYTqdVkvF6GliLWbu7WN4",
  authDomain: "matchlab-f7fb8.firebaseapp.com",
  projectId: "matchlab-f7fb8",
  storageBucket: "matchlab-f7fb8.firebasestorage.app",
  messagingSenderId: "791469272358",
  appId: "1:791469272358:web:3a3502f0b65d68bedb65e7"
};

function getLeagueId(){
    return new URLSearchParams(window.location.search).get("league");
}

window.goBack = function(){
    const leagueId = getLeagueId();
    window.location.href = "tabulky.html?league=" + leagueId;
}

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

onAuthStateChanged(auth,(user)=>{

if(!user){
window.location.href="login.html";
return;
}

document.body.style.display="block";

});


async function loadPlayers() {
  console.log("Načítám hráče...");  // Přidáno pro debugování

  const snap = await getDoc(doc(db, "appData", "main"));
  const data = snap.data();
  console.log("Načtená data z appData:", data);  // Přidáno pro debugování

  const leagueId = getLeagueId();
  console.log("ID ligy:", leagueId);  // Přidáno pro debugování

  let league = null;
  window.sportName = "";

  data.sports.forEach(s => {
    s.leagues?.forEach(l => {
      if (l.id === leagueId) {
        league = l;
        window.sportName = s.name;
      }
    });
  });

  if (!league) {
    document.getElementById("leagueTitle").textContent = "Liga nenalezena";
    return;
  }

  console.log("Načtená liga:", league);  // Přidáno pro debugování

  const season = league.seasons?.at(-1);
  if (!season) {
    document.getElementById("table").innerHTML = "<tr><td>Žádná sezóna</td></tr>";
    return;
  }

  const seasonId = season.id;
  console.log("Sezóna ID:", seasonId);  // Přidáno pro debugování

  window.rows = [];
  let rows = window.rows;

  const snapPlayers = await getDocs(collection(db, "players"));
  console.log("Načtení hráčů z kolekce players...");  // Přidáno pro debugování
  const allPlayers = snapPlayers.docs.map(d => d.data());
  console.log("Načtení hráčů:", allPlayers);  // Přidáno pro debugování

  league.teams.forEach(team => {
    const teamPlayers = allPlayers.filter(p => p.teamId === team.id);
    console.log("Hráči týmu", team.name, teamPlayers);  // Přidáno pro debugování

    teamPlayers.forEach(player => {
      const stats = player.stats?.total;
      if (!stats) return;

      if ((stats.matches || 0) === 0) return;

      if (window.sportName === "Hokej") {
        // Brankáři
        if (player.position === "GK") {
          rows.push({
            name: player.name,
            team: team.name,
            position: "GK",
            matches: stats.matches,
            minutes: stats.minutes || 0,
            saves: stats.saves || 0,
            shotsAgainst: stats.shotsAgainst || 0,
            savePct: (stats.shotsAgainst || 0) > 0
              ? ((stats.saves / stats.shotsAgainst) * 100).toFixed(1)
              : 0
          });
        } else {
          // Hokejoví hráči
          rows.push({
            name: player.name,
            team: team.name,
            position: player.position || "ATT",
            matches: stats.matches,
            minutes: stats.minutes || 0,
            goals: stats.goals || 0,
            assists: stats.assists || 0,
            points: (stats.goals || 0) + (stats.assists || 0),
            plusMinus: stats.plusMinus || 0,
            shots: stats.shots || 0,
            penaltyMinutes: stats.penaltyMinutes || 0,
            faceoffsTotal: stats.faceoffsTotal || 0,
            faceoffsWon: stats.faceoffsWon || 0,
            faceoffPct: (stats.faceoffsTotal || 0) > 0
              ? ((stats.faceoffsWon / stats.faceoffsTotal) * 100).toFixed(0)
              : 0,
            shootouts: stats.shootouts || 0,
            shootoutGoals: stats.shootoutGoals || 0,
            shootoutPct: (Number(stats.shootouts) || 0) > 0
              ? ((Number(stats.shootoutGoals || 0) / Number(stats.shootouts)) * 100).toFixed(0)
              : 0
          });
        }
      } else {
        // Fotbal
        rows.push({
          name: player.name,
          team: team.name,
          position: player.position || "ATT",
          matches: stats.matches,
          minutes: stats.minutes || 0,
          goals: stats.goals || 0,
          assists: stats.assists || 0,
          yellow: stats.yellow || 0,
          red: stats.red || 0,
          passes: stats.passesTotal || 0,
          passesCompleted: stats.passesMade || 0,
          passAccuracy: (stats.passesTotal || 0) > 0
            ? ((stats.passesMade / stats.passesTotal) * 100).toFixed(0)
            : 0,
          xgPer90: stats.minutes > 0
            ? ((stats.xg || 0) / stats.minutes * 90).toFixed(2)
            : 0,
          avgRating: player.stats?.total?.avgRating || 0,
          goalsPer90: stats.minutes > 0
            ? ((stats.goals / stats.minutes) * 90).toFixed(2)
            : 0
        });
      }
    });
  });

  console.log("Seznam hráčů k zobrazení:", rows);  // Přidáno pro debugování

  renderTable(window.rows);
}

// Barvy pro pozice hráčů
const positionColors = {
  GK: "#3498db",
  DEF: "#2ecc71",
  MID: "#f1c40f",
  ATT: "#e74c3c"
};

function renderTable(rows) {
  const table = document.getElementById("table");
  let html = "";
  if (window.sportName === "Hokej") {
    html = `
      <tr>
        <th>#</th>
        <th class="player">Brankář</th>
        <th onclick="sortBy('team')">Tým</th>
        <th onclick="sortBy('matches')">Z</th>
        <th onclick="sortBy('minutes')">TOI</th>
        <th onclick="sortBy('saves')">Zák</th>
        <th onclick="sortBy('shotsAgainst')">Stř</th>
        <th onclick="sortBy('savePct')">SV%</th>
      </tr>
    `;
    rows
      .filter(r => r.saves !== undefined)
      .forEach((r, i) => {
        html += `
          <tr>
            <td>${i + 1}</td>
            <td class="player">
              <span class="position" style="background:${positionColors[r.position]}">
                GK
              </span>
              ${r.name}
            </td>
            <td class="team">${r.team}</td>
            <td>${r.matches}</td>
            <td>${Math.floor(r.minutes / 60) + ":" + String(r.minutes % 60).padStart(2, "0")}</td>
            <td>${r.saves}</td>
            <td>${r.shotsAgainst}</td>
            <td><b>${r.savePct}%</b></td>
          </tr>
        `;
      });

    html += `
      <tr>
        <th>#</th>
        <th class="player">Hráč</th>
        <th onclick="sortBy('team')">Tým</th>
        <th onclick="sortBy('matches')">Z</th>
        <th onclick="sortBy('minutes')">TOI</th>
        <th onclick="sortBy('goals')">G</th>
        <th onclick="sortBy('assists')">A</th>
        <th onclick="sortBy('points')">B</th>
        <th onclick="sortBy('plusMinus')">+/-</th>
        <th onclick="sortBy('shots')">Stř</th>
        <th onclick="sortBy('penaltyMinutes')">TM</th>
        <th onclick="sortBy('faceoffsTotal')">Buly</th>
        <th onclick="sortBy('faceoffsWon')">Buly OK</th>
        <th onclick="sortBy('faceoffPct')">Buly %</th>
        <th onclick="sortBy('shootouts')">Náj</th>
        <th onclick="sortBy('shootoutGoals')">G Náj</th>
        <th onclick="sortBy('shootoutPct')">% Náj</th>
      </tr>
    `;

    rows
      .filter(r => r.points !== undefined)
      .forEach((r, i) => {
        html += `
          <tr>
            <td>${i + 1}</td>
            <td class="player">
              <span class="position" style="background:${positionColors[r.position]}">
                ${r.position}
              </span>
              ${r.name}
            </td>
            <td class="team">${r.team}</td>
            <td>${r.matches}</td>
            <td>${Math.floor(r.minutes / 60) + ":" + String(r.minutes % 60).padStart(2, "0")}</td>
            <td><b>${r.goals}</b></td>
            <td>${r.assists}</td>
            <td><b>${r.points}</b></td>
            <td>${r.plusMinus}</td>
            <td>${r.shots}</td>
            <td>${r.penaltyMinutes}</td>
            <td>${r.faceoffsTotal}</td>
            <td>${r.faceoffsWon}</td>
            <td>${r.faceoffPct}%</td>
            <td>${r.shootouts}</td>
            <td>${r.shootoutGoals}</td>
            <td>${r.shootoutPct}%</td>
          </tr>
        `;
      });
  } else {
    html = `
      <tr>
        <th>#</th>
        <th class="player">Hráč</th>
        <th onclick="sortBy('team')">Tým</th>
        <th onclick="sortBy('avgRating')">⭐</th>
        <th onclick="sortBy('matches')">Z</th>
        <th onclick="sortBy('minutes')">Min</th>
        <th onclick="sortBy('goals')">G</th>
        <th onclick="sortBy('assists')">A</th>
        <th onclick="sortBy('yellow')">🟨</th>
        <th onclick="sortBy('red')">🟥</th>
        <th onclick="sortBy('goalsPer90')">G/90</th>
        <th onclick="sortBy('passes')">Přihr.</th>
        <th onclick="sortBy('passesCompleted')">Přihr.OK</th>
        <th onclick="sortBy('passAccuracy')">%</th>
        <th onclick="sortBy('xgPer90')">xG/90</th>
      </tr>
    `;
  }

  if (window.sportName !== "Hokej") {
    rows.forEach((r, i) => {
      if (r.points !== undefined) {
        html += `
          <tr>
            <td>${i + 1}</td>
            <td class="player">
              <span class="position" style="background:${positionColors[r.position]}">
                ${r.position}
              </span>
              ${r.name}
            </td>
            <td class="team">${r.team}</td>
            <td>${r.matches}</td>
            <td>${Math.floor(r.minutes / 60) + ":" + String(r.minutes % 60).padStart(2, "0")}</td>
            <td><b>${r.goals}</b></td>
            <td>${r.assists}</td>
            <td><b>${r.points}</b></td>
            <td>${r.plusMinus}</td>
            <td>${r.shots}</td>
            <td>${r.penaltyMinutes}</td>
            <td>${r.faceoffsTotal}</td>
            <td>${r.faceoffsWon}</td>
            <td>${r.faceoffPct}%</td>
          </tr>
        `;
      }
    });
  }

  table.innerHTML = html;
}

window.sortBy = function (field) {
  window.rows.sort((a, b) => {
    const A = a[field];
    const B = b[field];
    if (typeof A === "string" && isNaN(A)) {
      return A.localeCompare(B);
    }
    return Number(B) - Number(A);
  });
  renderTable(window.rows);
};

loadPlayers();

</script>

</body>
</html>
